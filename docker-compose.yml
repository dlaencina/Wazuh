sudo nano /var/lib/docker/volumes/wazuhsiem_wazuh_etc/_data/rules/local_rules.xml

docker exec -it wazuhsiem-wazuh.manager-1 cat /var/log/suricata/eve.json | head -n 2

docker exec -it wazuhsiem-wazuh.manager-1 grep "suricata" /var/ossec/logs/ossec.log

docker exec -it wazuhsiem-wazuh.manager-1 grep -A 3 "eve.json" /var/ossec/etc/ossec.conf

docker cp /opt/wazuh/single-node/config/wazuh_cluster/wazuh_manager.conf wazuhsiem-wazuh.manager-1:/var/ossec/etc/ossec.conf

docker exec -it wazuhsiem-wazuh.manager-1 /var/ossec/bin/wazuh-control restart

<group name="local, custom_rules, windows, sysmon, security, system">

  <!-- ============================================================ -->
  <!-- RECONOCIMIENTO                                                -->
  <!-- ============================================================ -->

  <rule id="100001" level="8">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)whoami|systeminfo|nltest|netstat\s+-ano|ipconfig|arp\s+-a|net\s+user|net\s+group</field>
    <description>SOC - Reconocimiento: Comandos de enumeración de sistema detectados.</description>
    <mitre><id>T1033</id></mitre>
  </rule>

  <rule id="100021" level="11">
    <if_sid>60107</if_sid>
    <field name="win.eventdata.shareName" type="pcre2">(?i)\\\\.*\\(C\$|ADMIN\$|IPC\$)</field>
    <description>SOC - Reconocimiento: Intento de acceso a carpetas administrativas vía SMB.</description>
    <mitre><id>T1135</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- EJECUCIÓN                                                     -->
  <!-- ============================================================ -->

  <rule id="100004" level="10">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)Invoke-WebRequest|Net\.WebClient|IEX\s*\(|Invoke-Expression|-EncodedCommand|-enc\s+[A-Za-z0-9+/]{20}</field>
    <description>SOC - Ejecución: PowerShell descargando o ejecutando código remoto/ofuscado.</description>
    <mitre><id>T1059.001</id></mitre>
  </rule>

  <rule id="100012" level="12">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.image" type="pcre2">(?i)\\AppData\\(Local|Roaming)\\.*\.exe</field>
    <description>SOC - Ejecución: Proceso iniciado desde ruta temporal de usuario.</description>
    <mitre><id>T1059</id></mitre>
  </rule>

  <rule id="100024" level="11">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.parentImage" type="pcre2">(?i)winword\.exe|excel\.exe|outlook\.exe|onenote\.exe</field>
    <field name="win.eventdata.image" type="pcre2">(?i)cmd\.exe|powershell\.exe|wscript\.exe|cscript\.exe|mshta\.exe</field>
    <description>SOC - Ejecución: Shell lanzado desde aplicación Office (posible macro maliciosa).</description>
    <mitre><id>T1566.001</id></mitre>
  </rule>

  <rule id="100026" level="11">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.image" type="pcre2">(?i)\\mshta\.exe$</field>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)http|vbscript|javascript</field>
    <description>SOC - Ejecución/Evasión: MSHTA ejecutando contenido remoto o script (LOLBin).</description>
    <mitre><id>T1218.005</id></mitre>
  </rule>

  <rule id="100027" level="10">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.image" type="pcre2">(?i)\\(certutil|bitsadmin)\.exe$</field>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)http|ftp|urlcache|-transfer</field>
    <description>SOC - Ejecución: Descarga de archivo mediante LOLBin (certutil/bitsadmin).</description>
    <mitre><id>T1105</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- PERSISTENCIA                                                  -->
  <!-- ============================================================ -->

  <rule id="100006" level="9">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)schtasks\.exe.*/create</field>
    <description>SOC - Persistencia: Creación de tarea programada desde terminal.</description>
    <mitre><id>T1053.005</id></mitre>
  </rule>

  <rule id="100028" level="10">
    <if_group>sysmon_event13</if_group>
    <field name="win.eventdata.targetObject" type="pcre2">(?i)\\Software\\Microsoft\\Windows\\CurrentVersion\\(Run|RunOnce)</field>
    <description>SOC - Persistencia: Escritura en clave de registro de autoarranque (Run/RunOnce).</description>
    <mitre><id>T1547.001</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- ESCALADA DE PRIVILEGIOS                                       -->
  <!-- ============================================================ -->

  <rule id="100009" level="12">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)net\s+(localgroup\s+administrators|localgroup\s+administradores).*/add</field>
    <description>SOC - Escalada: Usuario añadido al grupo de Administradores locales.</description>
    <mitre><id>T1098</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- EVASIÓN DE DEFENSAS                                           -->
  <!-- ============================================================ -->

  <rule id="100003" level="12">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)DisableRealtimeMonitoring|DisableBehaviorMonitoring|DisableIOAVProtection|Set-MpPreference</field>
    <description>SOC - Evasión: Intento de desactivar o modificar Windows Defender.</description>
    <mitre><id>T1562.001</id></mitre>
  </rule>

  <rule id="100008" level="11">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)regsvr32\s+.*/i:http.*scrobj\.dll|regsvr32\s+.*/s\s+/n\s+/u</field>
    <description>SOC - Evasión: Bypass de AppLocker/ejecución usando Regsvr32 (Squiblydoo).</description>
    <mitre><id>T1218.010</id></mitre>
  </rule>

  <rule id="100010" level="12">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)stop-service.*wazuhsvc|net\s+stop\s+wazuhsvc|fltmc\s+unload\s+sysmon(drv)?|sc\s+stop\s+wazuh</field>
    <description>SOC - Evasión: Intento de detención del agente de seguridad (Sabotaje).</description>
    <mitre><id>T1562.001</id></mitre>
  </rule>

  <!-- PENDIENTE: Ajustar cuando se tenga inventario de usuarios autorizados
       para usar cacls/icacls. Añadir exclusión por usuario y/o IP origen.
  <rule id="100011" level="10">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)icacls\.exe|cacls\.exe|takeown\.exe</field>
    <description>SOC - Evasión: Modificación de permisos o propiedad de archivos.</description>
    <mitre><id>T1222.001</id></mitre>
  </rule>
  -->

  <rule id="100015" level="11">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)fDenyTSConnections.*0|EnableRemoteDesktop</field>
    <description>SOC - Evasión/Movimiento Lateral: Habilitación de RDP vía registro o comando.</description>
    <mitre><id>T1562.001</id></mitre>
  </rule>

  <rule id="100029" level="11">
    <if_group>sysmon_event7</if_group>
    <field name="win.eventdata.imageLoaded" type="pcre2">(?i)\\AppData\\|\\Temp\\|\\ProgramData\\.*\.dll</field>
    <field name="win.eventdata.signed">false</field>
    <description>SOC - Evasión: Carga de DLL no firmada desde ruta sospechosa (posible DLL hijacking).</description>
    <mitre><id>T1574.001</id></mitre>
  </rule>

  <rule id="100036" level="14">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)wevtutil\s+cl|wevtutil\s+clear-log|Clear-EventLog|Remove-EventLog</field>
    <description>SOC - Evasión CRÍTICA: Intento de borrado de los registros de eventos de Windows.</description>
    <mitre><id>T1070.001</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- ACCESO A CREDENCIALES                                         -->
  <!-- ============================================================ -->

  <rule id="100005" level="13">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)procdump.*lsass|comsvcs\.dll.*MiniDump|sekurlsa|Out-Minidump</field>
    <description>SOC - Credenciales: Volcado de memoria LSASS detectado.</description>
    <mitre><id>T1003.001</id></mitre>
  </rule>

  <rule id="100014" level="13">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)reg\s+save\s+HKLM\\(SAM|SECURITY|SYSTEM)</field>
    <description>SOC - Credenciales: Exportación de colmenas del registro (SAM/SECURITY/SYSTEM).</description>
    <mitre><id>T1003.002</id></mitre>
  </rule>

  <rule id="100025" level="14">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)ntdsutil|vssadmin.*ntds\.dit|\\ntds\.dit</field>
    <description>SOC - Credenciales: Acceso o volcado de NTDS.dit (base de datos de Active Directory).</description>
    <mitre><id>T1003.003</id></mitre>
  </rule>

  <!-- Pass-the-Hash: logon NTLM anónimo con credenciales nulas -->
  <rule id="100049" level="13">
    <if_sid>60106</if_sid>
    <field name="win.eventdata.authenticationPackageName" type="pcre2">(?i)^NTLM$</field>
    <field name="win.eventdata.logonType">^3$</field>
    <field name="win.eventdata.targetUserName" type="pcre2">(?i)^ANONYMOUS LOGON$</field>
    <description>SOC - Credenciales: Logon NTLM anónimo detectado (posible Pass-the-Hash).</description>
    <mitre><id>T1550.002</id></mitre>
  </rule>

  <!-- Pass-the-Hash: autenticación NTLM desde IP externa -->
  <rule id="100050" level="13">
    <if_sid>60106</if_sid>
    <field name="win.eventdata.authenticationPackageName" type="pcre2">(?i)^NTLM$</field>
    <field name="win.eventdata.logonType">^3$</field>
    <field name="win.eventdata.ipAddress" type="pcre2" negate="yes">^(192\.168\.14\.|192\.168\.15\.|172\.16\.|10\.|127\.|::1)</field>
    <description>SOC - Credenciales: Autenticación NTLM tipo red desde IP externa (posible Pass-the-Hash).</description>
    <mitre><id>T1550.002</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- MOVIMIENTO LATERAL                                            -->
  <!-- ============================================================ -->

  <rule id="100007" level="10">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)wmic\s+.*/node:.*(process\s+call\s+create|os\s+get)</field>
    <description>SOC - Movimiento Lateral: Ejecución remota de procesos mediante WMI.</description>
    <mitre><id>T1047</id></mitre>
  </rule>

  <rule id="100020" level="12">
    <if_sid>60143</if_sid>
    <field name="win.eventdata.serviceName" type="pcre2">(?i)PSEXEC|PAExec|RemCom|WCESERVICE</field>
    <description>SOC - Movimiento Lateral: Instalación de servicio de ejecución remota sospechoso.</description>
    <mitre><id>T1569.002</id></mitre>
  </rule>

  <!-- PENDIENTE: Ajustar umbral cuando se conozca volumen real de
       fallos Kerberos legítimos en el entorno.
  <rule id="100022" level="9">
    <if_sid>60122</if_sid>
    <field name="win.eventdata.logonType">^3$</field>
    <description>SOC - Movimiento Lateral: Autenticación de red fallida (SMB/Logon Type 3).</description>
    <mitre><id>T1550.002</id></mitre>
  </rule>
  -->

  <!-- PENDIENTE: Ajustar cuando se tenga inventario de usuarios autorizados.
  <rule id="100030" level="10">
    <if_group>sysmon_event3</if_group>
    <field name="win.eventdata.destinationPort" type="pcre2">^(445|135|139|5985|5986|22)$</field>
    <field name="win.eventdata.initiated">true</field>
    <description>SOC - Movimiento Lateral: Conexión saliente a puerto de administración remota.</description>
    <mitre><id>T1021</id></mitre>
  </rule>
  -->

  <!-- ============================================================ -->
  <!-- EXFILTRACIÓN Y C2                                             -->
  <!-- ============================================================ -->

  <rule id="100013" level="11">
    <if_sid>61654</if_sid>
    <field name="win.eventdata.query" type="pcre2">(?i)getscreen\.me|nextcloud\.com|anydesk\.com|teamviewer\.com|ngrok\.io|pagekite\.me|serveo\.net</field>
    <description>SOC - C2/Exfiltración: Consulta DNS a dominio de acceso remoto o túnel conocido.</description>
    <mitre><id>T1071.001</id></mitre>
  </rule>

  <rule id="100031" level="11">
    <if_group>sysmon_event3</if_group>
    <field name="win.eventdata.destinationPort" type="pcre2">^(4444|1337|8080|8443|9001|31337)$</field>
    <description>SOC - C2: Conexión saliente a puerto asociado a frameworks de ataque (Metasploit/Cobalt Strike).</description>
    <mitre><id>T1571</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- IMPACTO                                                       -->
  <!-- ============================================================ -->

  <rule id="100002" level="12">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)vssadmin\s+(delete\s+shadows|resize\s+shadowstorage)|wbadmin\s+delete\s+catalog|bcdedit\s+.*recoveryenabled\s+no|wmic\s+shadowcopy\s+delete</field>
    <description>SOC - Impacto: Destrucción de copias de seguridad (posible Ransomware).</description>
    <mitre><id>T1490</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- ACCESO / AUTENTICACIÓN                                        -->
  <!-- ============================================================ -->

  <rule id="100016" level="12" frequency="10" timeframe="30">
    <if_matched_sid>60122</if_matched_sid>
    <same_field>win.eventdata.ipAddress</same_field>
    <field name="win.eventdata.ipAddress" type="pcre2" negate="yes">^(192\.168\.14\.|192\.168\.15\.|172\.16\.)</field>
    <description>SOC - Acceso: Fuerza bruta rápida desde IP externa a la VPN.</description>
    <mitre><id>T1110.001</id></mitre>
  </rule>

  <rule id="100043" level="11" frequency="10" timeframe="300">
    <if_matched_sid>60122</if_matched_sid>
    <same_field>win.eventdata.ipAddress</same_field>
    <field name="win.eventdata.ipAddress" type="pcre2" negate="yes">^(192\.168\.14\.|192\.168\.15\.|172\.16\.)</field>
    <description>SOC - Acceso: Fuerza bruta lenta o password spraying desde IP externa.</description>
    <mitre><id>T1110.001</id></mitre>
  </rule>

  <rule id="100018" level="11">
    <if_sid>60122</if_sid>
    <field name="win.eventdata.targetUserName" type="pcre2">(?i)^(Administrator|Administrador|Admin|root|guest|invitado|backup|svc_.*|service.*)$</field>
    <description>SOC - Acceso: Fallo de login en cuenta crítica o de servicio.</description>
    <mitre><id>T1110</id></mitre>
  </rule>

  <rule id="100044" level="13">
    <if_sid>60204</if_sid>
    <description>SOC - Acceso: Cuenta bloqueada por exceso de intentos fallidos.</description>
    <mitre><id>T1110.001</id></mitre>
  </rule>

  <rule id="100045" level="13">
    <if_sid>60122</if_sid>
    <field name="win.eventdata.subStatus" type="pcre2">^0xc0000193$</field>
    <description>SOC - Acceso CRÍTICO: Intento de acceso con cuenta expirada.</description>
    <mitre><id>T1078</id></mitre>
  </rule>

  <!-- PENDIENTE: Revisar cuando se conozca patrón real de logins simultáneos.
  <rule id="100046" level="13" frequency="3" timeframe="60">
    <if_matched_sid>60106</if_matched_sid>
    <same_field>win.eventdata.targetUserName</same_field>
    <different_field>agent.id</different_field>
    <description>SOC - Acceso CRÍTICO: Mismo usuario autenticado en múltiples equipos simultáneamente.</description>
    <mitre><id>T1078</id></mitre>
  </rule>
  -->

  <rule id="100037" level="12" frequency="10" timeframe="120">
    <if_matched_sid>60122</if_matched_sid>
    <same_field>win.eventdata.targetUserName</same_field>
    <field name="win.eventdata.ipAddress" type="pcre2" negate="yes">^(192\.168\.14\.|192\.168\.15\.|172\.16\.)</field>
    <description>SOC - Acceso: Múltiples IPs externas atacando la misma cuenta (Password Spraying).</description>
    <mitre><id>T1110.003</id></mitre>
  </rule>

  <rule id="100038" level="14" frequency="3" timeframe="60">
    <if_matched_sid>60122</if_matched_sid>
    <if_sid>60106</if_sid>
    <same_field>win.eventdata.targetUserName</same_field>
    <description>SOC - CRÍTICO: Login exitoso tras múltiples fallos (posible fuerza bruta exitosa).</description>
    <mitre><id>T1110</id></mitre>
  </rule>

  <rule id="100039" level="10">
    <if_sid>60106</if_sid>
    <field name="win.eventdata.ipAddress" type="pcre2">^(?!192\.168\.14\.|192\.168\.15\.|172\.16\.|10\.|127\.|::1).*</field>
    <description>SOC - Acceso: Login exitoso desde IP fuera de rangos corporativos.</description>
    <mitre><id>T1078</id></mitre>
  </rule>

  <rule id="100042" level="11" frequency="5" timeframe="60">
    <if_matched_sid>60122</if_matched_sid>
    <same_field>win.eventdata.ipAddress</same_field>
    <different_field>win.eventdata.targetUserName</different_field>
    <field name="win.eventdata.ipAddress" type="pcre2" negate="yes">^(192\.168\.14\.|192\.168\.15\.|172\.16\.)</field>
    <description>SOC - Reconocimiento: IP externa probando múltiples cuentas distintas (enumeración de usuarios).</description>
    <mitre><id>T1087.002</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- ESCANEO DE RED                                                -->
  <!-- ============================================================ -->

  <rule id="100019" level="10" frequency="15" timeframe="15">
    <if_matched_sid>60107</if_matched_sid>
    <same_field>win.eventdata.ipAddress</same_field>
    <field name="win.eventdata.ipAddress" type="pcre2" negate="yes">^(192\.168\.14\.|192\.168\.15\.|172\.16\.)</field>
    <description>SOC - Red: Posible escaneo de puertos desde IP externa.</description>
    <mitre><id>T1046</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- CORRELACIÓN                                                   -->
  <!-- ============================================================ -->

  <rule id="100032" level="14" frequency="2" timeframe="300">
    <if_matched_sid>100016</if_matched_sid>
    <if_matched_sid>100019</if_matched_sid>
    <same_field>win.eventdata.ipAddress</same_field>
    <description>SOC - CRÍTICO: Misma IP realizando escaneo y fuerza bruta. Ataque activo en curso.</description>
    <mitre><id>T1110.001</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- CERTIFICADOS                                                  -->
  <!-- ============================================================ -->

  <rule id="100033" level="12">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)certutil\s+.*(-(delstore|addstore|importpfx|encodehex))|certmgr\s+.*/del</field>
    <description>SOC - Certificados: Manipulación o eliminación de certificados mediante certutil/certmgr.</description>
    <mitre><id>T1553.004</id></mitre>
  </rule>

  <rule id="100034" level="11">
    <if_group>sysmon_event13</if_group>
    <field name="win.eventdata.targetObject" type="pcre2">(?i)\\SOFTWARE\\Microsoft\\SystemCertificates|\\SOFTWARE\\Policies\\Microsoft\\SystemCertificates</field>
    <description>SOC - Certificados: Modificación en el almacén de certificados del sistema vía registro.</description>
    <mitre><id>T1553.004</id></mitre>
  </rule>

  <rule id="100035" level="13">
    <if_group>sysmon_event1</if_group>
    <field name="win.eventdata.commandLine" type="pcre2">(?i)certutil\s+.*(http|ftp).*\.(cer|crt|pfx|p12)</field>
    <description>SOC - Certificados: Descarga de certificado desde URL externa (posible instalación de CA falsa).</description>
    <mitre><id>T1553.004</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- AUDITORÍA DE SOFTWARE                                         -->
  <!-- ============================================================ -->

  <rule id="100051" level="8">
    <if_group>windows</if_group>
    <field name="win.system.eventID">^11707$</field>
    <description>SOC - Auditoría: Software instalado en el sistema: $(win.eventdata.data)</description>
    <options>no_full_log</options>
    <group>software_install,policy_violation</group>
    <mitre><id>T1078</id></mitre>
  </rule>

  <rule id="100052" level="12">
    <if_group>windows</if_group>
    <field name="win.system.eventID">^11724$</field>
    <description>SOC - Auditoría/Alerta: Software desinstalado del sistema: $(win.eventdata.data)</description>
    <options>no_full_log</options>
    <group>software_uninstall,policy_violation</group>
    <mitre><id>T1489</id></mitre>
  </rule>

  <!-- ============================================================ -->
  <!-- EXCLUSIONES / FALSOS POSITIVOS                                -->
  <!-- ============================================================ -->

  <!-- Falso positivo: monitores virtuales reconocidos en sesiones RDP.
       Windows genera Event ID 6416 (rule 60227) cuando se conecta un
       "Remote Display Adapter" o "Generic PnP Monitor" al iniciar una
       sesión RDP. No es un dispositivo físico ni un riesgo. -->
  <rule id="100053" level="0">
    <if_sid>60227</if_sid>
    <field name="win.eventdata.deviceDescription" type="pcre2">(?i)remote display adapter|generic pnp monitor</field>
    <description>SOC - Excluido: Dispositivo virtual RDP reconocido (falso positivo).</description>
  </rule>

  <!-- Falso positivo: conexiones automatizadas del servidor BDS a
       carpetas RDM via cuenta de equipo. Logon type 3 (network) es
       comportamiento esperado de esta integración. -->
  <rule id="100054" level="0">
    <if_sid>60106, 60137</if_sid>
    <field name="win.eventdata.targetUserName" type="pcre2">(?i)^ADDNIXPSMBDS002\$$</field>
    <field name="win.eventdata.logonType">^3$</field>
    <description>SOC - Excluido: Conexión/Desconexión de red automatizada de servidor BDS a carpeta RDM.</description>
  </rule>

</group>

