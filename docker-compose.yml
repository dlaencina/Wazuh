Despliegue de Wazuh SIEM (Single-Node) vía Portainer
Objetivo: Desplegar una instancia funcional de Wazuh (Manager, Indexer y Dashboard) utilizando contenedores, garantizando la persistencia de datos y la integridad de los certificados SSL/TLS.
1. Preparación y Clonación del Repositorio
El despliegue estándar de Docker mediante Portainer presenta un conflicto con las rutas relativas (./config). Al no ejecutarse el stack desde el directorio raíz del repositorio, los contenedores pierden el acceso a los certificados y archivos de configuración esenciales.
Solución aplicada:
•	Aplicando normativas FHS de Linux, preparamos el directorio oficial: /opt/wazuh.
•	Clonación del repositorio oficial en el host local: git clone https://github.com/wazuh/wazuh-docker.git -b v4.14.4.
2. Generación de Certificados
Generación manual de certificados mediante el contenedor de utilidades. Nos ubicamos en la carpeta clonada y ejecutamos:
•	docker compose -f generate-indexer-certs.yml run --rm generator.
3. Refactorización del Archivo Compose
Para solucionar el problema de las rutas, se realizó una refactorización del archivo Compose: Conversión de rutas relativas a rutas absolutas para asegurar que Docker Engine localice los volúmenes independientemente del contexto de ejecución de Portainer.
•	En lugar de la ruta original del usuario /home/alphacentauri/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/..., se reemplazaron todas las rutas relativas de los certificados por la ruta absoluta recomendada: /opt/wazuh/single-node/config/wazuh_indexer_ssl_certs/...
•	Estos cambios se aplicaron en los 3 contenedores: manager, indexer y dashboard.
4. Despliegue en el Web Editor de Portainer
•	Se copió el archivo docker-compose.yml modificado y se pegó en la pestaña Web editor de un nuevo Stack en Portainer.
•	Al hacer la instalación por medio del editor web de Portainer podemos observar cómo el control que tenemos es total.
5. Análisis de Seguridad e Instalación del Agente
•	Protocolos: El tráfico entre agentes y manager viaja por el puerto 1514 cifrado. Se recomienda exponer solo el puerto 443 (Dashboard) al exterior.
•	Conexión del Endpoint (Windows):
1.	Abrir consola PowerShell como Administrador en el equipo cliente.
2.	Ejecutar el comando de instalación (generado desde el Dashboard web de wazuh) para descargar el archivo .msi y enlazarlo a la IP del Manager.
3.	Arrancar el servicio en segundo plano ejecutando: Start-Service -Name "WazuhSvc" o NET START WazuhSvc.


# Wazuh App Copyright (C) 2017, Wazuh Inc. (License GPLv2)
services:
  wazuh.manager:
    image: wazuh/wazuh-manager:4.14.4
    hostname: wazuh.manager
    restart: always
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - INDEXER_URL="https://wazuh.indexer:9200"
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - /opt/wazuh/single-node/config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - /opt/wazuh/single-node/config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem
      - /opt/wazuh/single-node/config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key
      - /opt/wazuh/single-node/config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf

  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.14.4
    hostname: wazuh.indexer
    restart: always
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - /opt/wazuh/single-node/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - /opt/wazuh/single-node/config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.key
      - /opt/wazuh/single-node/config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.pem
      - /opt/wazuh/single-node/config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem
      - /opt/wazuh/single-node/config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem
      - /opt/wazuh/single-node/config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml
      - /opt/wazuh/single-node/config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.14.4
    hostname: wazuh.dashboard
    restart: always
    ports:
      - 443:5601
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - /opt/wazuh/single-node/config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - /opt/wazuh/single-node/config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - /opt/wazuh/single-node/config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - /opt/wazuh/single-node/config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - /opt/wazuh/single-node/config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      - wazuh.indexer
    links:
      - wazuh.indexer:wazuh.indexer
      - wazuh.manager:wazuh.manager

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh-indexer-data:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:
