nano /var/lib/docker/volumes/wazuhsiem_wazuh_integrations/_data/custom-misp

#!/bin/sh
# custom-misp wrapper for Wazuh integratord
# Llama al script Python embebido pasando los argumentos de Wazuh.

WPYTHON_BIN="framework/python/bin/python3"

SCRIPT_PATH_NAME="$0"
DIR_NAME="$(cd "$(dirname "${SCRIPT_PATH_NAME}")" && pwd -P)"
SCRIPT_NAME="$(basename "${SCRIPT_PATH_NAME}")"

case "${DIR_NAME}" in
    */active-response/bin | */wodles*)
        if [ -z "${WAZUH_PATH}" ]; then
            WAZUH_PATH="$(cd "${DIR_NAME}/../.." && pwd)"
        fi
        PYTHON_SCRIPT="${DIR_NAME}/${SCRIPT_NAME}.py"
    ;;
    */bin)
        if [ -z "${WAZUH_PATH}" ]; then
            WAZUH_PATH="$(cd "${DIR_NAME}/.." && pwd)"
        fi
        PYTHON_SCRIPT="${WAZUH_PATH}/framework/scripts/${SCRIPT_NAME}.py"
    ;;
    *)
        if [ -z "${WAZUH_PATH}" ]; then
            WAZUH_PATH="$(cd "${DIR_NAME}/.." && pwd)"
        fi
        PYTHON_SCRIPT="${DIR_NAME}/${SCRIPT_NAME}.py"
    ;;
esac

# Variable de entorno con la API key de MISP
export MISP_API_KEY="PEGA_AQUI_TU_API_KEY"

${WAZUH_PATH}/${WPYTHON_BIN} "${PYTHON_SCRIPT}" "$@"


chown root:999 /var/lib/docker/volumes/wazuhsiem_wazuh_integrations/_data/custom-misp
chmod 750 /var/lib/docker/volumes/wazuhsiem_wazuh_integrations/_data/custom-misp


stat -c '%g' /var/lib/docker/volumes/wazuhsiem_wazuh_integrations/_data/custom-misp.py

ls -la /var/lib/docker/volumes/wazuhsiem_wazuh_integrations/_data/custom-misp*
