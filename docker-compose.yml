1. Eliminar el Stack en Portainer
Ve a la interfaz web de Portainer > Stacks.

Selecciona tu stack de Wazuh y haz clic en Delete.

Qué hace: Detiene y destruye los contenedores (Indexer, Manager, Dashboard) y elimina la red interna que Portainer creó para comunicarlos.

2. Borrar los datos persistentes (Volúmenes)
En tu terminal, ejecuta:

Bash
docker volume prune -f
Qué hace: El comando prune elimina todos los volúmenes de Docker que no estén en uso por un contenedor activo. El flag -f (force) evita que te pida confirmación. Al haber borrado el stack en el paso 1, esto destruirá las bases de datos, alertas y logs de Wazuh guardados en tu disco.

3. Borrar los certificados antiguos
Para no arrastrar configuraciones viejas o llaves criptográficas a tu próximo despliegue, limpia la carpeta de certificados generada:

Bash
rm -rf /portainer/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/*
Qué hace: rm -rf fuerza el borrado recursivo de todo el contenido dentro de la carpeta de certificados, dejándola vacía y lista para generar credenciales nuevas cuando lo necesites.

Una vez hecho esto, tu PC quedará totalmente limpio de este despliegue de Wazuh.

