version: '3.8'

volumes:
  wazuh_certs:
  wazuh_indexer_data:
  wazuh_manager_data:
  wazuh_dashboard_config:

services:
  wazuh.init:
    image: wazuh/wazuh-certs-generator:0.0.1
    hostname: wazuh.init
    user: "0:0"
    volumes:
      - wazuh_certs:/certs
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /config
        printf "instances:\n  - name: wazuh.indexer\n    ip:\n      - 127.0.0.1\n  - name: wazuh.manager\n  - name: wazuh.dashboard\n" > /config/instances.yml
        /entrypoint.sh
        # ESTO ES LO QUE ARREGLA EL ERROR DEL VIDEO: Movemos todo a la raíz de /certs
        cp /certs/wazuh.manager/wazuh.manager.pem /certs/filebeat.pem
        cp /certs/wazuh.manager/wazuh.manager.key /certs/filebeat.key
        cp /certs/wazuh.indexer/wazuh.indexer.pem /certs/indexer.pem
        cp /certs/wazuh.indexer/wazuh.indexer.key /certs/indexer-key.pem
        cp /certs/admin/admin.pem /certs/admin.pem
        cp /certs/admin/admin.key /certs/admin-key.pem
        chmod -R 777 /certs
        echo "Certificados listos en la raíz"
    networks:
      - wazuh_net

  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.8.0
    hostname: wazuh.indexer
    restart: always
    depends_on:
      wazuh.init:
        condition: service_completed_successfully
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - wazuh_certs:/usr/share/wazuh-indexer/certs
    networks:
      - wazuh_net

  wazuh.manager:
    image: wazuh/wazuh-manager:4.8.0
    hostname: wazuh.manager
    restart: always
    depends_on:
      wazuh.init:
        condition: service_completed_successfully
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=admin
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_PASSWORD=admin
    volumes:
      - wazuh_manager_data:/var/ossec
      - wazuh_certs:/etc/ssl
    networks:
      - wazuh_net

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.8.0
    hostname: wazuh.dashboard
    restart: always
    depends_on:
      wazuh.init:
        condition: service_completed_successfully
    ports:
      - 443:5601
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=admin
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_PASSWORD=admin
    volumes:
      - wazuh_certs:/usr/share/wazuh-dashboard/certs
      - wazuh_dashboard_config:/usr/share/wazuh-dashboard/data/wazuh/config
    networks:
      - wazuh_net

networks:
  wazuh_net:
    driver: bridge


    /usr/share/wazuh-indexer/plugins/opensearch-security/tools/securityadmin.sh -cacert /usr/share/wazuh-indexer/certs/root-ca.pem -cert /usr/share/wazuh-indexer/certs/admin.pem -key /usr/share/wazuh-indexer/certs/admin-key.pem -h localhost -nhnv
