Paso 1: Preparar las llaves y el repositorio oficial
Esto descarga las credenciales oficiales de Docker y le dice a tu Ubuntu 24.04 exactamente de dónde bajar los paquetes seguros:

Bash
sudo apt-get update
sudo apt-get install ca-certificates curl
sudo install -m 0755 -d /etc/apt/keyrings
sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
sudo chmod a+r /etc/apt/keyrings/docker.asc

echo \
  "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
  $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
  sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
Paso 2: Instalar Docker y Compose
Ahora actualizamos la lista para que reconozca el nuevo repositorio que acabamos de agregar e instalamos el motor completo:

Bash
sudo apt-get update
sudo apt-get install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
Paso 3: Permisos para tu usuario
Para que no tengas que escribir sudo cada vez que quieras usar Docker (y para que Portainer funcione más cómodo luego):

Bash
sudo usermod -aG docker $USER
newgrp docker
Para confirmar que hemos triunfado, ejecuta este comando de prueba oficial de Docker:

Bash
docker run hello-world
Si te devuelve un mensaje que dice "Hello from Docker! This message shows that your installation appears to be working correctly", habremos superado el obstáculo. ¿Me avisas si sale bien para que pasemos inmediatamente a levantar Portainer y Wazuh?


sudo apt-get purge -y docker docker-engine docker.io docker-ce docker-ce-cli docker-buildx-plugin docker-compose-plugin docker-compose-v2 containerd containerd.io
Paso 2: Limpiar dependencias huérfanas
Bash
sudo apt-get autoremove -y --purge
Qué hace: Elimina cualquier librería o paquete secundario que se instaló junto con Docker y que tu sistema ya no necesita.

Paso 3: Borrar el binario manual de Docker Compose
Bash
sudo rm -f /usr/local/bin/docker-compose
Qué hace: Elimina el archivo ejecutable que descargaste manualmente con curl en uno de tus intentos anteriores.

Paso 4: Destruir los datos físicos (Imágenes, volúmenes y red)
Bash
sudo rm -rf /var/lib/docker
sudo rm -rf /var/lib/containerd
sudo rm -rf /etc/docker
Qué hace: Este es el paso más destructivo y necesario para empezar de cero. Elimina físicamente el lugar donde Docker guarda los contenedores descargados, las redes virtuales y las configuraciones del demonio.

Paso 5: Eliminar el repositorio y las claves criptográficas
Bash
sudo rm -f /etc/apt/sources.list.d/docker.list
sudo rm -f /etc/apt/keyrings/docker.asc
sudo rm -f /etc/apt/keyrings/docker.gpg
sudo apt-get update

1. Detener y borrar todos los contenedores en ejecució

Bash
sudo docker stop $(sudo docker ps -aq) 2>/dev/null
sudo docker rm $(sudo docker ps -aq) 2>/dev/null
Qué hace: Obliga a detener y eliminar cualquier contenedor residual que esté ocupando puertos o memoria.

2. Desinstalar Docker y limpiar paquetes

Bash
sudo apt-get purge -y docker-engine docker docker.io docker-ce docker-ce-cli docker-compose-plugin
sudo apt-get autoremove -y
Qué hace: Elimina el software de Docker del sistema operativo y limpia las dependencias que ya no sirven.

3. Borrado físico (El paso más importante)

Bash
sudo rm -rf /var/lib/docker /var/lib/containerd /etc/docker
sudo rm -rf ~/wazuh-docker /portainer
Qué hace: Destruye sin preguntar (-rf) los volúmenes, imágenes, configuraciones de red y las carpetas de trabajo anteriores que pudieras tener. Tu máquina ahora está en blanco.


