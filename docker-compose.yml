version: '3.8'

# Definimos Volúmenes Nombrados que Portainer gestionará al 100%
volumes:
  wazuh_certs:      # Aquí se guardarán los certificados SSL compartidos
  wazuh_indexer_data: # Persistencia de base de datos
  wazuh_manager_data: # Logs, alertas y claves de agentes
  wazuh_dashboard_config: # Configuración del panel web

services:
  # 1. EL CONTENEDOR DE INICIALIZACIÓN (Certs Generator)
  wazuh.init:
    image: wazuh/wazuh-certs-generator:0.0.1 # Herramienta oficial de certificados
    hostname: wazuh.init
    user: "0:0" # Ejecutar como root para poder escribir en los volúmenes
    volumes:
      - wazuh_certs:/output # Mapea el volumen nombrado a la carpeta de salida interna
    # Sobreescribimos el inicio para inyectar la configuración inline, fabricar los certs y salir
    entrypoint: >
      /bin/sh -c "
      mkdir -p /config &&
      printf 'instances:\n  - name: wazuh.indexer\n    ip:\n      - 127.0.0.1\n  - name: wazuh.manager\n  - name: wazuh.dashboard\n' > /config/instances.yml &&
      echo 'Creando certificados basados en configuración inline...' &&
      /entrypoint.sh &&
      cp -r /certs/* /output/ &&
      echo 'Certificados generados y copiados al volumen nombrado.'"
    networks:
      - wazuh_net

  # 2. WAZUH INDEXER (Base de Datos)
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.8.0
    hostname: wazuh.indexer
    restart: always
    # CRÍTICO: Esperar a que el contenedor init termine correctamente
    depends_on:
      wazuh.init:
        condition: service_completed_successfully # Solo arranca si init tuvo éxito
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - wazuh_certs:/usr/share/wazuh-indexer/certs # Lee los certs del volumen nombrado
    # Usamos configuración por defecto interna (sin bind mounts a ossec.conf)

  # 3. WAZUH MANAGER (Motor de seguridad)
  wazuh.manager:
    image: wazuh/wazuh-manager:4.8.0
    hostname: wazuh.manager
    restart: always
    depends_on:
      wazuh.init:
        condition: service_completed_successfully # Espera a los certs
      wazuh.indexer:
        condition: service_started
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      # Configuramos claves y URLs críticas mediante variables de entorno (no archivos físicos)
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword # Puedes cambiarla aquí
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      # Password por defecto para la API
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh_manager_data:/var/ossec
      - wazuh_certs:/etc/ssl # Mapea los certs de filebeat al path correcto

  # 4. WAZUH DASHBOARD (Panel Web)
  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.8.0
    hostname: wazuh.dashboard
    restart: always
    depends_on:
      wazuh.init:
        condition: service_completed_successfully # Espera a los certs
      wazuh.manager:
        condition: service_started
    ports:
      - 443:5601 # Accede mediante HTTPS://IP-UBUNTU
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_PASSWORD=MyS3cr37P450r.*- # Misma password API que el Manager
    volumes:
      - wazuh_certs:/usr/share/wazuh-dashboard/certs # Lee los certs del panel web
      - wazuh_dashboard_config:/usr/share/wazuh-dashboard/data/wazuh/config
    # No mapeamos opensearch_dashboards.yml físico para GUI-only

networks:
  wazuh_net:
    driver: bridge
