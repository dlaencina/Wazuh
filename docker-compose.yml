version: '3.8'

services:
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.7.2
    hostname: wazuh.indexer
    restart: always
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - /home/alphacentauri/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/:/usr/share/wazuh-indexer/certs/:ro
    ports:
      - "9200:9200"

  wazuh.manager:
    image: wazuh/wazuh-manager:4.7.2
    hostname: wazuh.manager
    restart: always
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USER=admin
      - INDEXER_PASSWORD=SecretPassword01!
    volumes:
      - /home/alphacentauri/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/:/etc/wazuh-indexer/certs/:ro

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.7.2
    hostname: wazuh.dashboard
    restart: always
    ports:
      - "443:5601"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - WAZUH_MANAGER=https://wazuh.manager
    volumes:
      - /home/alphacentauri/wazuh-docker/single-node/config/wazuh_indexer_ssl_certs/:/usr/share/wazuh-dashboard/certs/:ro
    depends_on:
      - wazuh.indexer
