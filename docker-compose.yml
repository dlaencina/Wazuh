Documentación Técnica: Despliegue e Integración de Sysmon con Wazuh
Fase 1: Preparación del archivo de configuración
Se descargó el binario Sysmon64.exe desde la suite Sysinternals de Microsoft. Antes de instalarlo se creó el archivo de configuración personalizado en C:\Windows\sysmonconfig.xml.
Objetivo del archivo: Evitar la fatiga de alertas bloqueando el ruido legítimo, pero manteniendo visibilidad estricta frente a técnicas de evasión como DLL Hijacking.
Configuración inicial aplicada:
xml<Sysmon schemaversion="4.90">
  <EventFiltering>

    <RuleGroup name="Filtrado Seguro DLLs (Rutas + Firmas)" groupRelation="and">
      <ImageLoad onmatch="exclude">
        <ImageLoaded condition="begin with">C:\Windows\System32</ImageLoaded>
        <Signature condition="contains">Microsoft</Signature>
        <SignatureStatus condition="is">Valid</SignatureStatus>
      </ImageLoad>
    </RuleGroup>

    <RuleGroup name="Persistencia Registro" groupRelation="or">
      <RegistryEvent onmatch="include">
        <TargetObject condition="contains">CurrentVersion\Run</TargetObject>
        <TargetObject condition="contains">SystemCertificates</TargetObject>
      </RegistryEvent>
    </RuleGroup>

  </EventFiltering>
</Sysmon>
Decisiones de diseño clave:
groupRelation="and" en ImageLoad — Una exclusión por ruta sola crea un punto ciego. Un atacante podría colocar una DLL maliciosa en System32 y Sysmon la ignoraría. Al combinar ruta AND firma Microsoft AND estado válido, solo se excluyen DLLs legítimas. Una DLL maliciosa no estará firmada por Microsoft, por lo que el and fallará y Sysmon la registrará igualmente.
RegistryEvent con include — Solo se registran modificaciones en claves específicas utilizadas por atacantes para ganar persistencia (CurrentVersion\Run) y modificaciones en el almacén de certificados (SystemCertificates). Esto evita registrar todos los cambios de registro del sistema, que serían miles por minuto.

Fase 2: Instalación del servicio en Windows
Desde PowerShell como administrador:
powershell.\Sysmon64.exe -accepteula -i C:\Windows\sysmonconfig.xml
Explicación del comando:

-accepteula — Acepta los términos de licencia de forma silenciosa, necesario para instalaciones por consola
-i C:\Windows\sysmonconfig.xml — Instala el servicio aplicando la configuración personalizada desde el primer momento


Fase 3: Integración con el agente Wazuh
Sysmon escribe sus eventos localmente en el Visor de Eventos bajo Microsoft-Windows-Sysmon/Operational. Se configuró el agente Wazuh para leer ese canal añadiendo el siguiente bloque en C:\Program Files (x86)\ossec-agent\ossec.conf:
xml<localfile>
  <location>Microsoft-Windows-Sysmon/Operational</location>
  <log_format>eventchannel</log_format>
</localfile>
Los canales Security y Application ya venían configurados por defecto en la instalación del agente. Se añadió adicionalmente el canal System para capturar eventos de Windows Update:
xml<localfile>
  <location>System</location>
  <log_format>eventchannel</log_format>
</localfile>
Se reinició el servicio del agente para que releyera el ossec.conf:
powershellRestart-Service Wazuh

Fase 4: Ajuste de configuración por problema de flooding
Durante el funcionamiento se detectó que el Event ID 7 (carga de DLLs) generaba un estado de flooded en el agente. El motivo era que aplicaciones como Microsoft Office y el framework .NET cargan miles de DLLs legítimas por minuto, saturando la cola del manager.
Se actualizó el archivo C:\Windows\sysmonconfig.xml para ampliar las rutas excluidas usando el operador contains any, que permite especificar múltiples rutas en una sola regla separadas por punto y coma:
xml<Sysmon schemaversion="4.90">
  <EventFiltering>

    <RuleGroup name="Filtrado Seguro DLLs (Rutas + Firmas)" groupRelation="and">
      <ImageLoad onmatch="exclude">
        <ImageLoaded condition="contains any">C:\Windows\System32;C:\Windows\SysWOW64;C:\Program Files\Microsoft Office;C:\Program Files (x86)\Microsoft Office;C:\Windows\assembly;C:\Windows\Microsoft.NET</ImageLoaded>
        <Signature condition="contains">Microsoft</Signature>
        <SignatureStatus condition="is">Valid</SignatureStatus>
      </ImageLoad>
    </RuleGroup>

    <RuleGroup name="Persistencia Registro" groupRelation="or">
      <RegistryEvent onmatch="include">
        <TargetObject condition="contains">CurrentVersion\Run</TargetObject>
        <TargetObject condition="contains">SystemCertificates</TargetObject>
      </RegistryEvent>
    </RuleGroup>

  </EventFiltering>
</Sysmon>
Se aplicó la nueva configuración en caliente sin reinstalar el servicio:
powershellc:\Windows\sysmon64.exe -c C:\Windows\sysmonconfig.xml

Event IDs activos tras la configuración final

ID 1 — Creación de procesos — activo por defecto
ID 3 — Conexiones de red — activo por defecto
ID 7 — Carga de módulos/DLLs — activo con filtro de rutas y firmas
ID 12 — Creación/eliminación de claves de registro — activo
ID 13 — Modificación de valores de registro — activo con filtro de rutas
ID 22 — Consultas DNS — activo por defecto


Dashboard SOC — Wazuh
Contexto
Dashboard configurado en OpenSearch Dashboards como parte del SOC interno basado en Wazuh 4.14. El entorno corre sobre Docker gestionado via Portainer en Ubuntu Server (10.104.2.11). Actualmente hay 1 agente activo en preproducción (WindowsAgent — Windows Server 2022), con previsión de escalar a casi 300 agentes en producción. El acceso remoto se realiza via VPN Fortinet (rango 192.168.14.x), red interna 192.168.15.x y servidores en 172.16.x.x. El entorno es 24/7. Integraciones activas: Sysmon (Event IDs 1, 3, 7, 12, 13) y Suricata IDS.

Decisiones de diseño

Se eliminaron los paneles de acceso fuera de horario laboral porque el entorno es 24/7.
Se usan tablas (Data Table) en lugar de gráficos de barras para las descripciones de reglas.
Todos los paneles de acceso excluyen rangos corporativos (192.168.14.x, 192.168.15.x, 172.16.x.x) para evitar falsos positivos.


Paneles configurados
Alertas Críticas (nivel 12+)
Metric. Índice wazuh-alerts-*. Filtro rule.level between 12 and 15. Muestra el número de alertas que requieren acción inmediata en las últimas 24h.
Alertas de Atención (nivel 10-11)
Metric. Índice wazuh-alerts-*. Filtro rule.level between 10 and 11. Alertas de severidad media para revisión.
Top 10 IPs con Fallos de Login
Data Table. Índice wazuh-alerts-*. Filtro rule.id 60122 (Event 4625). Terms por data.win.eventdata.ipAddress, size 10. Identifica IPs con más intentos de login fallidos.
Top Reglas Más Disparadas
Data Table. Índice wazuh-alerts-*. Terms por rule.description, size 15. Muestra qué reglas generan más alertas, útil para detectar ataques y afinar falsos positivos.
Evolución de Alertas
Line Chart. Índice wazuh-alerts-*. Date Histogram por timestamp. Tendencia de alertas en el tiempo.
Alertas por Agente
Data Table. Índice wazuh-alerts-*. Excluye wazuh.manager. Terms por agent.name. Distribución de alertas por agente.
Cuentas Bloqueadas
Data Table. Índice wazuh-alerts-*. Filtro rule.id 60204 (Event 4740). Terms por data.win.eventdata.targetUserName. Vacío hasta que se produzca un bloqueo de cuenta.
Vulnerabilidades por Severidad
Data Table. Índice wazuh-states-vulnerabilities*. Terms por vulnerability.severity. Datos actuales: 7 Medium, 4 High, 1 Low.
NTLM Anónimo / Pass-the-Hash
Data Table. Índice wazuh-alerts-*. Filtro rule.id 100049 o 100050. Terms por data.win.eventdata.targetUserName. Detecta autenticaciones NTLM anónimas y desde IPs externas. Vacío hasta que se produzca un ataque.
Tendencia Alertas (Hoy vs Ayer)
TSVB. Índice wazuh-alerts-*. Dos series: alertas hoy y alertas ayer (offset 1d). Compara el volumen actual con el del día anterior.
Parches Windows
Data Table. Índice wazuh-alerts-*. Filtro Event IDs 19, 20, 21 (WindowsUpdateClient). Terms por data.win.system.message. Canal System añadido al agente recientemente, sin datos todavía.

Limitaciones

Solo 1 agente activo en preproducción.
Los paneles de Cuentas Bloqueadas, Pass-the-Hash y Parches estarán vacíos hasta que ocurran esos eventos.
No hay medición de volumen de tráfico en bytes. Suricata detecta por firma pero no mide megabytes.
La gestión de estados de alertas (activo/resuelto) se realiza manualmente. Wazuh es reactivo y no gestiona estados de incidentes.


Cambios en reglas derivados del dashboard
Regla 100039 — Se detectó que generaba falsos positivos con localhost (127.0.0.1 y ::1). Se añadieron esas exclusiones al filtro de IPs.
Reglas 100049 y 100050 — Añadidas para cubrir detección de Pass-the-Hash tras identificar ese gap al revisar las alertas que reportaba S2 Grupo.





