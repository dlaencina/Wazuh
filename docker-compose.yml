version: '3.8'

services:
  # 1. Generador de Certificados
  wazuh.certs:
    image: wazuh/wazuh-certs-generator:0.0.1
    container_name: wazuh-certs
    volumes:
      - wazuh_certs:/certs
    command: >
      bash -c "if [ ! -f /certs/wazuh-indexer-min.pem ]; then
        /entrypoint.sh;
      fi"

  # 2. Wazuh Indexer (Motor de búsqueda y base de datos)
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.8.0
    container_name: wazuh-indexer
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=SecretPassword"
      - "network.host=0.0.0.0"
      - "discovery.type=single-node"
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - wazuh_certs:/usr/share/wazuh-indexer/certs:ro
    depends_on:
      wazuh.certs:
        condition: service_completed_successfully
    restart: always

  # 3. Wazuh Manager (Servidor central y API)
  wazuh.manager:
    image: wazuh/wazuh-manager:4.8.0
    container_name: wazuh-manager
    ports:
      - "1514:1514"
      - "1515:1515"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_USER=wazuh-wui
      - WAZUH_API_PASSWORD=SecretPassword
    volumes:
      - wazuh_manager_data:/var/ossec/data
      - wazuh_certs:/etc/ssl/certs:ro
    depends_on:
      - wazuh.indexer
    restart: always

  # 4. Wazuh Dashboard (Interfaz gráfica)
  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.8.0
    container_name: wazuh-dashboard
    ports:
      - "443:5601"
    environment:
      - OPENSEARCH_HOSTS=https://wazuh.indexer:9200
      - WAZUH_API_URL=https://wazuh.manager:55000
      - OPENSEARCH_USERNAME=admin
      - OPENSEARCH_PASSWORD=SecretPassword
      - WAZUH_API_USER=wazuh-wui
      - WAZUH_API_PASSWORD=SecretPassword
    volumes:
      - wazuh_certs:/usr/share/wazuh-dashboard/certs:ro
    depends_on:
      - wazuh.manager
    restart: always

volumes:
  wazuh_certs:
  wazuh_indexer_data:
  wazuh_manager_data:
