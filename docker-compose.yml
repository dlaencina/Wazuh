c:\Windows\sysmon64.exe -c C:\Windows\sysmonconfig.xml

Documentación Técnica: Despliegue e Integración de Sysmon con Wazuh
Fase 1: Preparación del Motor y Filtros
Descarga: Se obtuvo el binario oficial Sysmon64.exe desde la suite Sysinternals de Microsoft.

Creación de Reglas (Tuning): Se creó un archivo de configuración personalizado en C:\Windows\sysmonconfig.xml.

Objetivo del archivo: Evitar la fatiga de alertas bloqueando el ruido legítimo, pero manteniendo una visibilidad estricta frente a técnicas de evasión (como DLL Hijacking).

Exclusión Condicionada (exclude con lógica and): Se configuró para ignorar la carga de librerías (ImageLoad) en rutas nativas como C:\Windows\System32, únicamente si el archivo posee una firma criptográfica válida (Valid) perteneciente a Microsoft. Si un malware intenta ejecutar una DLL maliciosa camuflada en esa carpeta, la validación fallará y el evento será registrado.

Inclusión (include con lógica or): Se instruyó a Sysmon para vigilar modificaciones en el registro de Windows (RegistryEvent), concretamente en claves utilizadas por los atacantes para ganar persistencia (ej. CurrentVersion\Run).

Fase 2: Instalación del Servicio en Windows
Se procedió a la instalación del servicio a nivel de sistema operativo para iniciar la recolección de telemetría avanzada.

Se abrió una consola de PowerShell con privilegios de Administrador.

Se navegó hasta el directorio donde se descargó el binario Sysmon64.exe.

Se ejecutó el siguiente comando de instalación:

PowerShell
.\Sysmon64.exe -accepteula -i C:\Windows\sysmonconfig.xml
Explicación del comando: * .\Sysmon64.exe: Llama al ejecutable principal.

-accepteula: Fuerza la aceptación silenciosa de los términos de licencia de Microsoft (necesario para instalaciones por consola).

-i C:\Windows\sysmonconfig.xml: Instala el servicio en el sistema y le inyecta la ruta exacta de la nueva directiva de filtrado seguro.

Fase 3: Integración del Agente (Wazuh)
Sysmon por sí solo no envía datos a la red; escribe sus eventos de forma local en el Visor de Eventos de Windows bajo la ruta Microsoft-Windows-Sysmon/Operational. Se configuró el agente de Wazuh para leer este canal.

Se editó el archivo de configuración maestro del agente ubicado en C:\Program Files (x86)\ossec-agent\ossec.conf.

Se inyectó el siguiente bloque de recolección local:

XML
  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>
Explicación de la configuración:

<localfile>: Indica a Wazuh que debe leer un origen de datos local en la máquina.

<location>: Apunta exactamente a la ruta interna del Visor de Eventos donde Sysmon escribe sus hallazgos.

<log_format>eventchannel</log_format>: Especifica que el formato a leer es el formato estructurado nativo de los eventos de Windows moderno.

Fase 4: Aplicación y Despliegue
Para que el agente de Wazuh comenzara a procesar esta nueva directiva de recolección de logs, se reinició su servicio.

Se ejecutó el siguiente comando en PowerShell (como Administrador):

PowerShell
Restart-Service Wazuh
Explicación del comando: Detiene e inicia el servicio de Wazuh de forma limpia. Esto obliga al agente a releer el archivo ossec.conf y a abrir la comunicación con el canal de Sysmon, enviando a partir de ese momento la telemetría validada al Manager.

c:\Windows\sysmon64.exe -c C:\Windows\sysmonconfig.xml

