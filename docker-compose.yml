SOC Wazuh — Configuración de grupos de agentes
Fecha: 14 de abril de 2026
Autor: David
Entorno: Wazuh 4.14 (Docker sobre Portainer, Ubuntu Server 10.104.2.11)
Estado: Desplegado sobre WindowsAgent (Windows Server 2022, 10.104.2.121) en preproducción
1. Objetivo
Centralizar la configuración de los agentes Wazuh mediante grupos y agent.conf distribuidos desde el manager, de forma que al escalar a los ~300 servidores Windows previstos en producción toda la configuración de monitorización se gestione desde un único punto.
Principio rector: el ossec.conf local del agente contiene únicamente lo imprescindible para que el servicio arranque y contacte con el manager. Todo lo demás (canales de eventlog, syscheck, Sysmon, SCA, syscollector) se distribuye desde los grupos centralizados.
2. Modelo de grupos
Wazuh permite asignar un agente a varios grupos simultáneamente. Los agent.conf de todos los grupos asignados se fusionan (no se sobrescriben) antes de enviarse al agente. Esto habilita un modelo por capas:

Capa base — configuración común a todo Windows Server.
Capa de rol — específica del rol del servidor (DC, web, SQL, RDSH).
Capa de entorno — etiqueta el servidor según el entorno en el que opera (pre, DMZ).

2.1 Grupos creados
Se crearon siete grupos desde Agents management → Groups → Add new group:
GrupoTipoPropósitowindows_baseBaseConfiguración común a todos los Windows Serverdomain_controllersRolServidores con Active Directory (NTDS, SYSVOL, Kerberos)web_serversRolServidores con IISsql_serversRolServidores con Microsoft SQL Serverrdp_serversRolRemote Desktop Session Hosts con múltiples usuarios concurrentespreproductionEntornoEtiqueta de entorno de preproducción / pruebasdmzEntornoEtiqueta de servidores expuestos al exterior
2.2 Cómo combinar grupos
Un agente típico se asigna a windows_base + (rol si aplica) + entorno. Ejemplos:

Servidor web de producción expuesto → windows_base,web_servers,dmz
Domain Controller interno → windows_base,domain_controllers
Servidor SQL en preproducción → windows_base,sql_servers,preproduction
Servidor de pruebas genérico → windows_base,preproduction

Importante sobre rdp_servers: se usa exclusivamente para Remote Desktop Session Hosts reales (servidores con múltiples usuarios finales trabajando simultáneamente por RDP). No asignarlo a servidores donde RDP solo se usa como vía de administración — en ese caso, windows_base ya es suficiente.
3. Contenido de cada agent.conf
Los siguientes XML se editaron desde el dashboard en Agents management → Groups → [grupo] → Edit group configuration.
3.1 windows_base
Configuración base para todo Windows Server: canales de eventlog, syscheck mixto (scan periódico + realtime), rootcheck, SCA y syscollector.
xml<agent_config>

  <!-- ============================================================ -->
  <!-- CANALES DE EVENTLOG DE WINDOWS                                -->
  <!-- ============================================================ -->

  <localfile>
    <location>Security</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>System</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Application</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-Sysmon/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ============================================================ -->
  <!-- SYSCHECK (FILE INTEGRITY MONITORING)                          -->
  <!-- ============================================================ -->

  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <directories check_all="yes" realtime="no">C:\Windows\System32\wbem</directories>
    <directories check_all="yes" realtime="no">C:\Windows\SysWOW64\drivers\etc</directories>
    <directories check_all="yes" realtime="no">C:\Program Files</directories>
    <directories check_all="yes" realtime="no">C:\Program Files (x86)</directories>

    <directories check_all="yes" realtime="yes">C:\Windows\System32\drivers\etc</directories>
    <directories check_all="yes" realtime="yes">C:\Windows\System32\Tasks</directories>
    <directories check_all="yes" realtime="yes">C:\Users\Public\Desktop</directories>
    <directories check_all="yes" realtime="yes">C:\ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp</directories>

    <windows_registry>HKEY_LOCAL_MACHINE\Software\Classes\batfile</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Classes\cmdfile</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Classes\exefile</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Classes\piffile</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Classes\AllFilesystemObjects</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Classes\Directory</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Classes\Folder</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Classes\Protocols</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Policies</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Security</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Internet Explorer</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Windows NT\CurrentVersion\Winlogon</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services</windows_registry>

    <ignore>C:\Program Files\Windows Defender</ignore>
    <ignore>C:\Program Files (x86)\Windows Defender</ignore>
    <ignore type="sregex">.log$|.htm$|.jpg$|.png$|.chm$|.pnf$|.evtx$</ignore>

  </syscheck>

  <!-- ============================================================ -->
  <!-- ROOTCHECK                                                     -->
  <!-- ============================================================ -->

  <rootcheck>
    <disabled>no</disabled>
    <windows_apps>./shared/win_applications_rcl.txt</windows_apps>
    <windows_malware>./shared/win_malware_rcl.txt</windows_malware>
  </rootcheck>

  <!-- ============================================================ -->
  <!-- SCA (SECURITY CONFIGURATION ASSESSMENT)                       -->
  <!-- ============================================================ -->

  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>

  <!-- ============================================================ -->
  <!-- SYSCOLLECTOR (INVENTARIO)                                     -->
  <!-- ============================================================ -->

  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
    <hotfixes>yes</hotfixes>
  </wodle>

</agent_config>
Decisiones de diseño:

Syscheck mixto: scan completo cada 12h (frequency=43200) sobre rutas grandes + realtime sobre rutas pequeñas y muy sensibles (tareas programadas, hosts file, startup folders). Realtime sobre todo el sistema saturaría el manager; scan cada 12h sobre rutas críticas daría detección demasiado tardía.
SCA activado desde el día uno: genera alertas de nivel 3-7, fuera de los paneles de críticas (12+) y atención (10-11), pero proporciona un baseline de hardening contra CIS desde el primer momento. La política se autodetecta según la versión de Windows del agente.
ports all="no": solo reporta puertos en LISTEN, no todas las conexiones establecidas, para evitar volúmenes excesivos.
hotfixes yes: alimenta el panel de Parches Windows del dashboard SOC.
Exclusión de Windows Defender: se actualiza constantemente con definiciones nuevas y generaría cientos de alertas diarias sin valor.

3.2 domain_controllers
Añade sobre windows_base los canales y rutas específicas de Active Directory. No repite los canales base (Security, System, Application, Sysmon) porque Wazuh fusiona los agent.conf de todos los grupos asignados al agente.
xml<agent_config>

  <!-- ============================================================ -->
  <!-- CANALES DE EVENTLOG ESPECÍFICOS DE ACTIVE DIRECTORY           -->
  <!-- ============================================================ -->

  <localfile>
    <location>Directory Service</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>DNS Server</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>File Replication Service</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ============================================================ -->
  <!-- SYSCHECK ADICIONAL PARA RUTAS CRÍTICAS DE AD                  -->
  <!-- ============================================================ -->

  <syscheck>

    <directories check_all="yes" realtime="yes">C:\Windows\NTDS</directories>
    <directories check_all="yes" realtime="yes">C:\Windows\SYSVOL</directories>

    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\Lsa</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services\Kdc</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services\NTDS\Parameters</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services\Netlogon\Parameters</windows_registry>

  </syscheck>

</agent_config>
Decisiones de diseño:

Directory Service: captura Event IDs 5136, 5137, 5141 (cambios en objetos AD — usuarios, grupos, GPOs, permisos de OUs). Permite detectar ataques tipo DCShadow y modificaciones silenciosas de grupos privilegiados.
C:\Windows\NTDS en realtime: contiene ntds.dit, base de datos de AD con todos los hashes NTLM del dominio. Complementa la regla custom 100025 (detección por línea de comandos) añadiendo detección a nivel de sistema de ficheros.
C:\Windows\SYSVOL en realtime: un atacante que modifique un script de logon aquí gana ejecución en todos los equipos del dominio que lo ejecuten.
Wazuh autodetecta DC: no hay que especificar política SCA específica. Wazuh 4.x detecta automáticamente si el agente es un Domain Controller y aplica la política CIS correspondiente.

3.3 web_servers
Monitorización de IIS: logs de acceso, logs de error, directorio web y configuración.
xml<agent_config>

  <!-- ============================================================ -->
  <!-- LOGS DE IIS (ACCESO Y ERRORES)                                -->
  <!-- ============================================================ -->

  <localfile>
    <location>C:\inetpub\logs\LogFiles\W3SVC*\*.log</location>
    <log_format>iis</log_format>
  </localfile>

  <localfile>
    <location>C:\Windows\System32\LogFiles\HTTPERR\*.log</location>
    <log_format>iis</log_format>
  </localfile>

  <!-- ============================================================ -->
  <!-- SYSCHECK ADICIONAL PARA IIS                                   -->
  <!-- ============================================================ -->

  <syscheck>

    <directories check_all="yes" realtime="yes" report_changes="yes">C:\inetpub\wwwroot</directories>
    <directories check_all="yes" realtime="yes">C:\Windows\System32\inetsrv\config</directories>

  </syscheck>

</agent_config>
Decisiones de diseño:

Wildcard W3SVC*\*.log: captura los logs de todos los sitios IIS sin enumerarlos uno a uno. Cuando se escale a producción, se adapta automáticamente sin reconfigurar.
report_changes="yes" sobre wwwroot: envía el diff del contenido modificado al manager. Si un atacante sube una web shell, en la alerta aparece el código añadido. Solo se activa aquí porque en otras rutas generaría volumen excesivo.
Realtime sobre inetsrv\config: donde vive applicationHost.config, archivo maestro de configuración de IIS. Un atacante puede modificarlo para añadir módulos HTTP maliciosos o redirigir sitios.
No se incluye Apache ni Nginx: si aparecen en el futuro, se crea un grupo separado para mantener cada grupo enfocado a una tecnología concreta.

3.4 sql_servers
Monitorización de Microsoft SQL Server: ERRORLOG nativo, directorios de datos/backup/binarios, y claves de registro.
xml<agent_config>

  <!-- ============================================================ -->
  <!-- LOGS NATIVOS DE SQL SERVER                                    -->
  <!-- ============================================================ -->

  <localfile>
    <location>C:\Program Files\Microsoft SQL Server\MSSQL*\MSSQL\Log\ERRORLOG</location>
    <log_format>syslog</log_format>
  </localfile>

  <!-- ============================================================ -->
  <!-- SYSCHECK ADICIONAL PARA SQL SERVER                            -->
  <!-- ============================================================ -->

  <syscheck>

    <directories check_all="yes" realtime="no">C:\Program Files\Microsoft SQL Server\MSSQL*\MSSQL\DATA</directories>
    <directories check_all="yes" realtime="no">C:\Program Files\Microsoft SQL Server\MSSQL*\MSSQL\Backup</directories>
    <directories check_all="yes" realtime="yes">C:\Program Files\Microsoft SQL Server\MSSQL*\MSSQL\Binn</directories>

    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\Microsoft SQL Server</windows_registry>
    <windows_registry>HKEY_LOCAL_MACHINE\Software\Microsoft\MSSQLServer</windows_registry>

    <ignore type="sregex">\.mdf$|\.ldf$|\.ndf$</ignore>

  </syscheck>

</agent_config>
Decisiones de diseño:

Wildcard MSSQL*: agnóstico a versión (SQL 2019 = MSSQL15, SQL 2022 = MSSQL16) y a nombre de instancia.
DATA y Backup en scan periódico + exclusión de .mdf/.ldf/.ndf: los datafiles cambian constantemente mientras SQL está en marcha. El realtime saturaría el manager con miles de alertas sin valor. Solución: scan periódico que detecta aparición/desaparición de ficheros enteros + <ignore> por extensión que suprime las alertas de cambios internos.
Binn en realtime: los binarios del servicio SQL no deberían cambiar nunca salvo en un parche planificado. Cualquier modificación es sospechosa (posible reemplazo con versión troyanizada).
No se activa SQL Audit nativo: requiere configuración dentro de SQL Server por parte de los DBAs. Queda como mejora futura si Carlos lo plantea.

3.5 rdp_servers
Solo para Remote Desktop Session Hosts reales (múltiples usuarios finales concurrentes). No asignar a servidores donde RDP se usa solo para administración.
xml<agent_config>

  <!-- ============================================================ -->
  <!-- NOTA DE DISEÑO                                                -->
  <!-- ============================================================ -->
  <!--
    Este grupo está pensado para Remote Desktop Session Hosts (RDSH):
    servidores donde múltiples usuarios finales se conectan por RDP
    para trabajar, NO para servidores donde RDP se usa solo como vía
    de administración (en ese caso basta con windows_base).
  -->

  <!-- ============================================================ -->
  <!-- CANALES DE EVENTLOG DE TERMINAL SERVICES                      -->
  <!-- ============================================================ -->

  <localfile>
    <location>Microsoft-Windows-TerminalServices-LocalSessionManager/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <localfile>
    <location>Microsoft-Windows-RemoteDesktopServices-RdpCoreTS/Operational</location>
    <log_format>eventchannel</log_format>
  </localfile>

  <!-- ============================================================ -->
  <!-- SYSCHECK ADICIONAL PARA PERFILES DE USUARIO                   -->
  <!-- ============================================================ -->

  <syscheck>

    <directories check_all="yes" realtime="yes">C:\Users\*\Downloads</directories>
    <directories check_all="yes" realtime="yes">C:\Users\*\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup</directories>

    <ignore>C:\Users\Default</ignore>
    <ignore>C:\Users\Public</ignore>
    <ignore type="sregex">AppData\\Local\\Temp</ignore>
    <ignore type="sregex">AppData\\Local\\Microsoft\\Windows\\INetCache</ignore>

  </syscheck>

</agent_config>
Decisiones de diseño:

Tres canales de Terminal Services: LocalSessionManager captura eventos de sesión de alto nivel (logon, logoff, reconexión — Event IDs 21, 23, 24, 25), RemoteConnectionManager captura la capa de gestión de conexiones (Event ID 1149), y RdpCoreTS captura el nivel de protocolo RDP (handshake, negociación). Los tres dan visibilidad completa del ciclo de vida de una sesión RDP.
C:\Users\*\Downloads en realtime: en un RDSH los usuarios descargan archivos desde el navegador. Los atacantes los usan como vector inicial. Realtime da detección en cuanto aparece un ejecutable.
Startup por usuario en realtime: cada usuario tiene su propia carpeta de Startup donde archivos colocados se ejecutan automáticamente al iniciar sesión. Persistencia clásica a nivel de usuario sin requerir privilegios de administrador.
Exclusiones: Default y Public no son usuarios reales; AppData\Local\Temp e INetCache generan ruido masivo de navegación legítima.

3.6 preproduction
Grupo de entorno sin configuración de monitorización. Se usa exclusivamente para etiquetar agentes y permitir filtrado en el dashboard.
xml<agent_config>

  <!--
    Grupo de entorno para servidores de preproducción / pruebas.
    No contiene configuración de monitorización — solo etiqueta
    las alertas con agent.labels.environment = preproduction para
    permitir filtrado en el dashboard.
  -->

  <labels>
    <label key="environment">preproduction</label>
    <label key="criticality">low</label>
  </labels>

</agent_config>
Efecto: todas las alertas generadas por los agentes en este grupo incluyen los campos agent.labels.environment: preproduction y agent.labels.criticality: low en el JSON del evento, lo que permite filtros limpios en Discover tipo agent.labels.environment: preproduction o NOT agent.labels.environment: preproduction para ocultar el ruido de pre en los paneles de producción.
3.7 dmz
Análogo a preproduction pero para servidores expuestos al exterior.
xml<agent_config>

  <!--
    Grupo de entorno para servidores expuestos al exterior (DMZ).
    No contiene configuración de monitorización — solo etiqueta
    las alertas con agent.labels.environment = dmz y
    criticality = high para permitir filtrado y priorización
    en el dashboard.
  -->

  <labels>
    <label key="environment">dmz</label>
    <label key="criticality">high</label>
  </labels>

</agent_config>
4. Reglas de exclusión añadidas al ruleset
Para evitar falsos positivos conocidos del entorno, se añadieron dos reglas de supresión (level 0) al final del archivo /var/lib/docker/volumes/wazuhsiem_wazuh_etc/_data/rules/local_rules.xml, en una nueva sección EXCLUSIONES / FALSOS POSITIVOS antes del </group> de cierre.
4.1 Regla 100053 — Monitores virtuales RDP
Windows genera el Event ID 6416 (regla base 60227) cuando se conecta un "Remote Display Adapter" o "Generic PnP Monitor" al iniciar una sesión RDP. Son dispositivos virtuales, no físicos, y no representan riesgo de seguridad. Se verificó previamente en Discover que el campo data.win.eventdata.deviceDescription existe con ese nombre exacto en el decoder.
xml<rule id="100053" level="0">
  <if_sid>60227</if_sid>
  <field name="win.eventdata.deviceDescription" type="pcre2">(?i)remote display adapter|generic pnp monitor</field>
  <description>SOC - Excluido: Dispositivo virtual RDP reconocido (falso positivo).</description>
</rule>
4.2 Regla 100054 — Conexiones automatizadas del servidor BDS a carpetas RDM
El servidor ADDNIXPSMBDS002 (cuenta de equipo ADDNIXPSMBDS002$) genera conexiones y desconexiones automatizadas contra los recursos compartidos donde Remote Desktop Manager (RDM, de Devolutions) almacena su base de datos de conexiones. Se autentica por red (logonType 3) y dispara las reglas base 60106 (logon) y 60137 (logoff) de forma constante. Se verificó que la regla 60137 existe en el ruleset base (Windows user logoff level 3).
xml<rule id="100054" level="0">
  <if_sid>60106, 60137</if_sid>
  <field name="win.eventdata.targetUserName" type="pcre2">(?i)^ADDNIXPSMBDS002\$$</field>
  <field name="win.eventdata.logonType">^3$</field>
  <description>SOC - Excluido: Conexión/Desconexión de red automatizada de servidor BDS a carpeta RDM.</description>
</rule>
Nota sobre el mecanismo de supresión: Wazuh aplica la regla más específica que hace match. La 100054 añade dos condiciones (targetUserName y logonType) sobre las reglas 60106/60137, por lo que solo suprime los eventos de esa cuenta concreta con ese tipo de logon. Cualquier otro usuario haciendo logon/logoff sigue disparando las reglas originales normalmente.
5. Migración del agente WindowsAgent
5.1 Limpieza del ossec.conf local
Antes de asignar el agente a los nuevos grupos, se editó C:\Program Files (x86)\ossec-agent\ossec.conf en el servidor Windows para eliminar los bloques <localfile> con <log_format>eventchannel</log_format> que se habían configurado manualmente en sesiones anteriores (Security, System, Application, Sysmon/Operational).
Motivo: si se dejaban en el ossec.conf local al mismo tiempo que se asignaba el agente a windows_base, el agente leería los mismos canales dos veces (una por la config local, otra por la config centralizada) y enviaría cada evento duplicado al manager, saturando la cola y provocando el error 204 de "agent event queue flooded".
Lo que NO se tocó: los bloques <localfile> sin eventchannel (por ejemplo los que leen active-responses.log o ossec.log) se dejaron intactos. Esos son parte de la configuración base nativa del agente y Wazuh los necesita para monitorizar su propia salud.
Tras la edición, se reinició el servicio del agente desde PowerShell como administrador:
powershellRestart-Service WazuhSvc
En este momento, el agente queda sin leer ningún canal de eventlog hasta que se le asignen los grupos desde el manager.
5.2 Asignación de grupos al agente
Desde el dashboard de Wazuh:

Endpoints → seleccionar el agente WindowsAgent marcando su checkbox.
More → Add groups to agents.
Asignar: windows_base, preproduction.
Quitar el grupo default (para que no pise la configuración centralizada).
Guardar.

En cuestión de segundos, el agente descarga el agent.conf fusionado de ambos grupos desde el manager y empieza a enviar telemetría centralizada con las etiquetas de entorno aplicadas.
Nota sobre rdp_servers: durante la sesión se asignó inicialmente también este grupo al agente, pero se retiró al confirmar que el WindowsAgent no es un RDSH real — es un servidor Windows de preproducción donde RDP se usa solo para administración, escenario ya cubierto por windows_base. La asignación final del agente es únicamente windows_base + preproduction.
5.3 Verificación post-migración
Para confirmar que la migración es correcta, se comprueba en Discover del dashboard:

Que llegan eventos de los cuatro canales esperados:

data.win.system.channel: "Security"
data.win.system.channel: "System"
data.win.system.channel: "Application"
data.win.system.channel: "Microsoft-Windows-Sysmon/Operational"


Que las alertas llevan las etiquetas de entorno: al abrir cualquier alerta reciente del agente, el JSON del evento debe contener los campos agent.labels.environment: preproduction y agent.labels.criticality: low.
Que no hay duplicados: una alerta reciente debe aparecer una sola vez, no dos veces con timestamps muy cercanos. Si aparecen duplicados, indica que el ossec.conf local aún tiene algún <localfile> de eventchannel sin borrar.
Que no se dispara el error 204: filtro rule.description: *flooded* sin resultados recientes.

6. Estado final

Grupos creados: 7 (windows_base, domain_controllers, web_servers, sql_servers, rdp_servers, preproduction, dmz).
Grupos con agent.conf rellenos: los 7.
Agentes migrados a configuración centralizada: 1 (WindowsAgent → windows_base + preproduction).
Reglas de exclusión añadidas: 2 (100053, 100054).
ossec.conf local del WindowsAgent: limpiado de bloques eventchannel manuales.

7. Pendiente

Regla 100053: verificar su funcionamiento con una alerta 60227 real del entorno.
Regla 100054: verificar su funcionamiento cuando el servidor BDS realice su siguiente conexión automatizada a la carpeta RDM.
Crear decoders personalizados (próxima fase).
Asignar grupos adicionales a agentes de producción a medida que se desplieguen.


Cópialo tal cual al wiki. Los bloques de código en markdown con triple backtick se renderizan correctamente en la mayoría de wikis (Confluence, MediaWiki, GitLab, Notion, DokuWiki). Si tu wiki usa sintaxis distinta para bloques de código, solo tienes que sustituir los ``` por el equivalente.

Guía de Discover y KQL para analistas SOC — Wazuh
Entorno: Wazuh 4.14 sobre OpenSearch Dashboards
Audiencia: analistas SOC internos
Propósito: referencia operativa para investigación de alertas en Discover

1. ¿Qué es Discover?
Discover es la pestaña de exploración de datos en crudo del dashboard de Wazuh. Todo lo que los paneles del SOC muestran agregado (Alertas Críticas, Top IPs, etc.) sale de consultas sobre los mismos datos que aparecen en Discover. La diferencia es que los paneles muestran el resumen; Discover muestra cada evento individual con todos sus campos.
Es la herramienta de análisis forense del analista. Cuando salta una alerta, el flujo es:

Ver el panel correspondiente.
Abrir Discover.
Filtrar el evento concreto.
Revisar el JSON completo.
Reconstruir qué pasó antes y después.
Decidir si es incidente o falso positivo.
Reportar con contexto a IT si procede.


2. Estructura de la pantalla de Discover
ZonaUbicaciónFunciónSelector de índiceArriba izquierdaDefine qué datos mira Discover. Para alertas: wazuh-alerts-*Barra de búsqueda KQLArriba centroDonde se escriben los filtrosTime pickerArriba derechaRango temporal (Last 24 hours, Today, rangos personalizados)Tabla de resultadosCentroLista cronológica de eventos que cumplen el filtroPanel de camposLateral izquierdaLista de campos disponibles para filtrar o añadir como columnaHistograma temporalEncima de la tablaBarras con recuento de eventos por intervalo

3. Qué es KQL
Kibana Query Language. Sintaxis simple para filtrar eventos. Se escribe en la barra de búsqueda superior.
Ejemplo básico:
rule.level >= 12
agent.name: "WindowsAgent"
Operadores principales: AND, OR, NOT, paréntesis para agrupar. Los strings con espacios o caracteres especiales van entre comillas.

4. Referencia completa de KQL
4.1 Igualdad con :
Busca coincidencia exacta con un valor.
campo: valor
Ejemplos:
agent.id: "002"
rule.level: 10
decoder.name: "sshd"
Si el valor contiene espacios o caracteres especiales, se pone entre comillas.
4.2 Comparación numérica
Solo funciona con campos numéricos.
campo > valor
campo >= valor
campo < valor
campo <= valor
Ejemplos:
rule.level >= 10
rule.firedtimes > 5
4.3 Combinar con AND
Exige que se cumplan las dos condiciones.
condición1 AND condición2
Ejemplos:
agent.id: "002" AND rule.level >= 10
agent.name: "kaliAgent" AND decoder.name: "sshd"
4.4 Combinar con OR
Basta con que se cumpla una de las condiciones.
condición1 OR condición2
Ejemplos:
agent.name: "kaliAgent" OR agent.name: "WindowsAgent"
rule.level >= 12 OR rule.groups: "authentication_failed"
4.5 Negar con NOT
Excluye lo que cumpla la condición.
NOT campo: valor
Ejemplos:
NOT data.srcuser: "david"
NOT rule.level: 3
4.6 Agrupar con paréntesis
Controla el orden cuando se mezclan AND, OR y NOT. Cuando hay dudas del orden, se ponen paréntesis siempre.
(condición1 OR condición2) AND condición3
Ejemplos:
(agent.name: "kaliAgent" OR agent.name: "WindowsAgent") AND rule.level >= 10
agent.id: "002" AND (rule.groups: "syscheck" OR rule.groups: "rootcheck")
4.7 Varios valores del mismo campo (atajo OR)
Evita repetir el nombre del campo.
campo: (valor1 OR valor2 OR valor3)
Ejemplos:
rule.id: ("5710" OR "5503" OR "2502")
agent.name: ("kaliAgent" OR "WindowsAgent")
Equivalente a:
rule.id: "5710" OR rule.id: "5503" OR rule.id: "2502"
4.8 Wildcards con asterisco
El asterisco significa "cualquier cosa". Puede ir al principio, al final o en medio.
campo: valor*         Empieza por "valor"
campo: *valor         Termina en "valor"
campo: *valor*        Contiene "valor" en cualquier parte
Ejemplos:
data.srcuser: admin*
rule.description: *brute*
full_log: *10.104.2.12*
Los wildcards no funcionan dentro de comillas.
4.9 Existencia de campo
Comprueba si un campo está presente en el evento.
campo: *              Existe con algún valor
NOT campo: *          No existe o está vacío
Ejemplos:
data.srcuser: *                                           Eventos donde el decoder extrajo srcuser
NOT data.srcuser: * AND decoder.name: "sshd"              Eventos SSH donde el decoder no extrajo srcuser
Muy útil para saber cuándo un decoder no ha rellenado un campo y entender si el dato hay que buscarlo en full_log.
4.10 Rango numérico
campo: [min TO max]     Incluye los extremos
campo: {min TO max}     Excluye los extremos
Ejemplos:
rule.level: [10 TO 12]
rule.level: {10 TO 15}
4.11 Rango temporal en KQL
Alternativa al time picker cuando se quiere precisión.
@timestamp > "fecha"
@timestamp < "fecha"
@timestamp: [ "fecha1" TO "fecha2" ]
Ejemplos:
@timestamp > "2026-04-17T00:00:00"
@timestamp: [ "2026-04-16" TO "2026-04-17" ]
4.12 Búsqueda libre sin campo
Busca el valor en cualquier campo indexado del evento.
valor
Ejemplos:
"fuerza bruta"
10.104.2.12
No es eficiente con grandes volúmenes, pero sirve para explorar rápido cuando no se sabe en qué campo está el dato.
4.13 Frase exacta entre comillas
Busca las palabras juntas en ese orden exacto.
campo: "frase exacta"
Ejemplos:
rule.description: "Logon Failure"
full_log: "Invalid user"
Diferencia con wildcards: *failure* encuentra cualquier palabra que contenga "failure" (incluso "database_failure"). "Logon Failure" solo encuentra esa frase exacta con las dos palabras juntas.
4.14 Dos palabras cercanas (AND dentro del mismo campo)
Las palabras pueden estar separadas en el texto, pero las dos tienen que aparecer.
campo: (palabra1 AND palabra2)
Ejemplo:
full_log: (password AND failed)
4.15 Signo de interrogación ?
Comodín para un solo carácter.
campo: valo?
Ejemplo:
data.srcuser: admin?
Encuentra admin1, admin2, adminA, pero no admin ni administrator. Uso poco frecuente.

5. Campos más usados de Wazuh
5.1 Del agente
agent.id                       ID numérico (001, 002...)
agent.name                     Nombre del agente
agent.ip                       IP del agente
agent.labels.environment       preproduction, dmz, production
agent.labels.criticality       low, medium, high
5.2 De la regla
rule.id                        Identificador numérico
rule.level                     Severidad 0-15
rule.description               Texto de la regla
rule.groups                    authentication_failed, syscheck, rootcheck, etc.
rule.firedtimes                Veces que ha disparado en esta ejecución
5.3 Del log original
full_log                       Log crudo completo
location                       Origen del log (/var/log/auth.log, journald, eventchannel)
decoder.name                   Decoder que parseó el evento (sshd, windows_eventchannel, rootcheck)
predecoder.program_name        Nombre del programa que escribió el log
predecoder.hostname            Hostname origen
5.4 Campos específicos de Windows
data.win.system.eventID                        Event ID (4624, 4625, 4740...)
data.win.system.channel                        Canal (Security, System, Sysmon/Operational)
data.win.eventdata.targetUserName              Usuario objetivo
data.win.eventdata.ipAddress                   IP origen del intento
data.win.eventdata.logonType                   Tipo de logon (1=interactive, 3=network, 10=remote)
data.win.eventdata.authenticationPackageName   NTLM, Kerberos
data.win.eventdata.commandLine                 Comando ejecutado (Sysmon)
data.win.eventdata.image                       Proceso que se ejecuta
data.win.eventdata.parentImage                 Proceso padre
5.5 Campos específicos de Linux y SSH
data.srcuser                   Usuario origen (solo cuando el decoder lo extrae)
data.srcip                     IP origen
data.srcport                   Puerto origen
data.dstuser                   Usuario destino
data.dstip                     IP destino
5.6 Campos de syscheck (FIM)
syscheck.path                  Ruta del fichero modificado
syscheck.event                 added, modified, deleted
syscheck.size_after             Tamaño tras la modificación
syscheck.size_before            Tamaño previo
syscheck.sha1_after             Hash tras la modificación
5.7 Campos de rootcheck
data.title                     Título del hallazgo
data.file                      Archivo afectado

6. Herramientas de Discover (más allá de KQL)
Son funciones de la interfaz, no sintaxis. Un analista SOC las usa tanto o más que KQL.
6.1 Filtros visuales — Add filter
Añade filtros haciendo clic en los valores de la tabla sin escribir KQL.
En cualquier campo del JSON expandido, al pasar el ratón aparecen dos iconos: lupa con + y lupa con -.

+ añade el valor como filtro (equivale a campo: valor).
- excluye el valor (equivale a NOT campo: valor).

Caso práctico: al abrir una alerta y ver data.srcuser: pepito, pulsando + el filtro se convierte automáticamente en data.srcuser: "pepito". Más rápido que escribir KQL cuando se está explorando.
6.2 Pinnar filtros entre pestañas
Un filtro pinneado se mantiene al cambiar entre Discover, Dashboards, Visualize.
En los filtros aplicados (aparecen como chips arriba), pinchar y elegir "Pin across all apps".
Útil cuando se investiga un incidente y se quiere que toda la UI filtre por un criterio común (por ejemplo, agent.id: "002" para centrarse en un agente concreto).
6.3 Guardar búsquedas — Save
Guarda un filtro KQL + columnas + ordenación con un nombre para recuperarlo con un clic.
Proceso:

Construir el filtro (ej: rule.level >= 10 AND agent.id: "002").
Configurar las columnas deseadas (ej: timestamp, rule.id, rule.description, data.srcuser).
Ordenar por timestamp descendente.
Pulsar Save arriba a la derecha.
Dar un nombre descriptivo: "Alertas críticas Kali 24h".

Recuperación posterior: pulsar Open y cargar la búsqueda guardada.
Búsquedas recomendadas para el trabajo diario:

"Revisión matutina — alertas nivel 10+ últimas 24h"
"Fallos de autenticación últimas 24h"
"Actividad del Kali últimas 24h"
"Eventos FIM últimas 24h"
"Top reglas disparadas hoy"

6.4 Top values
Muestra los valores más repetidos de un campo sin contarlos a mano.
En el panel lateral izquierdo de campos, al hacer clic en cualquier campo, aparecen los N valores más frecuentes con su porcentaje.
Ejemplo: al clicar en data.srcuser:
david       60%
pepito      25%
admin       10%
guest       5%
Útil para responder preguntas tipo "¿qué usuarios fallan más?", "¿de qué IP vienen más eventos?", "¿qué reglas generan más ruido?".
6.5 Histograma temporal
Gráfica de barras con recuento de eventos por intervalo, encima de la tabla.
Detecta picos de actividad a simple vista. Clic y arrastrar sobre las barras hace zoom temporal — más rápido que usar el time picker.
6.6 Personalización de columnas
Por defecto, Discover muestra una columna _source con todo el JSON junto. Se puede cambiar:

En el panel lateral de campos, buscar el campo deseado.
Pasar el ratón por encima y pulsar + o "Add field as column".
La tabla pasa a mostrar columnas estructuradas.

Columnas típicas para una tabla de análisis:
timestamp
agent.name
rule.id
rule.description
data.srcuser (si aplica)
data.srcip (si aplica)
full_log
6.7 Ordenación
Clic en el encabezado de una columna alterna entre orden descendente, ascendente y sin orden. Para reconstruir una línea temporal de incidente, ordenar timestamp ascendente (más antiguo primero).

7. Metodología de análisis SOC
KQL y Discover son herramientas, no el trabajo. El trabajo es:

Detectar anomalías respecto al baseline.
Tirar del hilo (pivoting).
Reconstruir la historia (timeline).
Decidir si es incidente o falso positivo.
Reportar con contexto a IT.

7.1 Pivoting — análisis por correlación
Cuando se ve una alerta, tirar del hilo buscando alertas relacionadas.
Ejemplo práctico:

Se abre una alerta 5710 con data.srcip: 10.104.2.50.
Se filtra por esa IP: data.srcip: "10.104.2.50".
Se ve toda la actividad de esa IP.
Se coge uno de los usuarios que aparecen: data.srcuser: "admin".
Se ve de qué IPs viene ese usuario.
Se mira una de esas IPs más a fondo.

Eso es pivoting: moverse por los datos saltando de un campo a otro para reconstruir la historia.
7.2 Timeline reconstruction
Ordenar los eventos por tiempo ascendente para entender la secuencia del ataque.
Un ataque tiene fases (reconocimiento → explotación → acceso → movimiento lateral). Verlo en orden cronológico permite reconstruir qué hizo el atacante y en qué orden.
7.3 Baseline mental del entorno
Saber de memoria qué es normal en la red.
Ejemplos de baseline:

"El WindowsAgent genera unas 200 alertas/día de nivel 3-5, sobre todo logons rutinarios."
"El Kali genera unos 15-20 hits/día de rootcheck por falsos positivos conocidos."
"La cuenta ADDNIXPSMBDS002$ se autentica con éxito unas 30-40 veces/día."

Si un día se ven 2000 alertas del WindowsAgent o 0 autenticaciones del BDS, el baseline avisa de que algo raro pasa.
No se aprende leyendo, se aprende viendo los datos cada día. Usar Discover como herramienta diaria es lo que construye el baseline.
7.4 Context switching — múltiples fuentes
Cuando se ve algo raro, mirarlo desde varios ángulos antes de decidir.
Ejemplo con un fallo NTLM de cuenta de equipo:

Se ve el fallo → se busca si hay logon exitoso posterior → no se encuentra → se deduce que la cuenta podría estar rota.
Se corrobora con más fuentes: ¿hay actividad en Suricata desde esa IP? ¿Qué dice el syscollector del servidor origen? ¿Hay cambios recientes en el syscheck?

Cuantas más fuentes corroboran la misma historia, más seguro es el diagnóstico.

8. Trampas y detalles importantes
8.1 Los campos estructurados no siempre están
El decoder rellena los campos data.* cuando puede extraerlos del log crudo. Cuando no puede, el campo no existe o está vacío, pero el dato puede estar en full_log.
Ejemplo: en un fallo SSH, data.srcuser se rellena en la regla 5710 (Invalid user) porque el log lo dice literalmente, pero no se rellena en la regla 2502 (PAM more failures) porque el log PAM tiene ruser= vacío.
Al investigar, si los campos estructurados no tienen el dato, mirar full_log.
8.2 Nombres de campos en Windows
Los eventos de Windows llegan con nombres en camelCase dentro de data.win.eventdata, no con jerarquía de puntos. Ejemplos correctos:
data.win.eventdata.targetUserName       Correcto
data.win.eventdata.target.User.Name     Incorrecto
Para conocer el nombre exacto de un campo: abrir una alerta real, expandir el JSON, y copiar el nombre tal cual aparece.
8.3 Zonas horarias
Los timestamps en full_log suelen estar en UTC (hora universal), mientras que @timestamp del dashboard se muestra en la zona horaria local del navegador. La diferencia es normal, no indica desincronización.
8.4 NOT con campos ausentes
En Wazuh 4.14, el filtro NOT campo: valor incluye los eventos donde el campo no existe o está vacío. Es el comportamiento intuitivo esperado, pero en otras versiones puede ser diferente.
8.5 Blacklist vs whitelist (filtros de exclusión)
Para cazar atacantes desconocidos, es más robusto filtrar excluyendo el ruido conocido (usuarios legítimos, IPs corporativas, procesos esperados) que listar atacantes concretos. Así, cualquier actividad nueva y desconocida aparece automáticamente.
Ejemplo:
NOT data.srcuser: ("david" OR "carlos" OR "backup_service")
Esto muestra todo lo que no sea uno de esos tres usuarios legítimos. Si mañana aparece un atacante con usuario hacker123, aparecerá automáticamente.
8.6 Los campos con $ final
Las cuentas de máquina Windows terminan en $ (ej: SERVIDOR01$). En KQL se escriben tal cual:
data.win.eventdata.targetUserName: "ADDNIXPSMBDS002$"
No hace falta escapar el $ en KQL. En reglas XML con pcre2 sí (\$$).

9. Flujo de trabajo recomendado
9.1 Revisión matutina diaria

Abrir la búsqueda guardada "Revisión matutina".
Filtro base: rule.level >= 10 en últimas 24h.
Revisar cada alerta: ¿es incidente o ruido conocido?
Los que sean ruido conocido → documentar como candidatos a regla de exclusión.
Los que sean incidentes → escalar a IT con contexto.

9.2 Investigación de una alerta concreta

Abrir la alerta en Discover.
Expandir el JSON completo.
Identificar campos clave: agent.name, rule.id, data.srcuser, data.srcip, full_log.
Leer full_log para contexto humano.
Pivoting: filtrar por agent.name del evento en una ventana de ±5 minutos para ver qué pasó alrededor.
Pivoting adicional por IPs o usuarios implicados.
Decisión: incidente / falso positivo / sospechoso pendiente de más datos.

9.3 Reporte a IT
Formato mínimo:

Qué pasó: descripción en lenguaje humano (no IDs de reglas).
Cuándo: timestamp con zona horaria.
Dónde: agente, IPs implicadas.
Quién: usuarios implicados si aplica.
Impacto o riesgo estimado.
Recomendación: qué acción sugerir (revisar configuración, resetear cuenta, investigar endpoint, etc.).

No enviar volcados de JSON crudos. Traducir al lenguaje de operación.

10. Ejercicios para practicar
Construir los filtros de estas preguntas uno a uno. Ordenados de más fácil a más difícil.
10.1 Nivel básico

Todas las alertas del kaliAgent.
Alertas con nivel 12 o superior.
Alertas del WindowsAgent con nivel exactamente 5.

10.2 Combinando operadores

Alertas del Kali con nivel 10 o superior.
Alertas de fallos de autenticación (rule.groups contiene "authentication_failed") del WindowsAgent.
Alertas con descripción que contenga "brute".

10.3 Filtros con exclusión

Fallos SSH del Kali excluyendo los del usuario david.
Alertas del WindowsAgent que no sean de nivel 3.
Alertas de cualquier agente donde la IP 10.104.2.12 aparezca en full_log, excluyendo las que sean del propio Kali.

10.4 Avanzados

Alertas de rule.id 5710, 5503 o 2502, del Kali, en las últimas 24h, excluyendo las del usuario david.
Alertas de rule.groups que contenga "syscheck" o "rootcheck" del Kali, de hace más de 6 horas.
Alertas de Windows donde el logonType sea 3 (network) y la IP no esté en rangos corporativos.

10.5 Operativos (uso de funciones de Discover)

Crear una búsqueda guardada llamada "Fallos auth últimas 24h" con el filtro rule.groups: "authentication_failed", columnas timestamp + agent.name + rule.description + data.srcuser + full_log, ordenada por timestamp descendente.
Desde una alerta del Kali, usar Add filter para añadir agent.id: "002" con un clic. Pinnear el filtro. Cambiar a Dashboards y verificar que el filtro se aplica también allí.
En el panel de campos, hacer clic en rule.id y ver qué IDs son los más frecuentes en 24h. Interpretar qué reglas generan más ruido.


11. Resumen rápido (chuleta)
Operadores esenciales:
:      igualdad
>=     mayor o igual
AND    combinar dos condiciones obligatorias
OR     una u otra
NOT    excluir
()     agrupar
*      comodín
Campos más consultados:
agent.name, agent.id, agent.labels.environment
rule.id, rule.level, rule.description, rule.groups
data.srcuser, data.srcip
data.win.eventdata.targetUserName, data.win.eventdata.ipAddress
data.win.system.eventID
full_log
Acciones de interfaz:
Clic en valor + lupa         Filtrar por ese valor
Save                         Guardar búsqueda reutilizable
Clic en campo lateral        Ver top values (valores más frecuentes)
Arrastrar sobre histograma   Zoom temporal
Clic en encabezado columna   Ordenar ascendente/descendente
Flujo de investigación:
1. Abrir alerta
2. Expandir JSON y leer full_log
3. Pivoting por IP / usuario / agente
4. Timeline ascendente
5. Context switching (varias fuentes)
6. Decisión: incidente / falso positivo / dudoso
7. Reporte a IT con contexto

12. Mantenimiento de esta guía
Este documento se actualiza a medida que:

Aparecen nuevos tipos de alertas relevantes para el entorno.
Se descubren patrones de falso positivo recurrentes.
Se incorporan nuevas integraciones al SIEM (nuevos agentes, nuevas fuentes de logs).
Se crean nuevas búsquedas guardadas que merece la pena compartir con el equipo.

Responsable de mantenimiento: equipo SOC interno.



<agent_config>

  <!-- ============================================================ -->
  <!-- CANALES DE LOGS DE LINUX                                      -->
  <!-- ============================================================ -->

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <!-- ============================================================ -->
  <!-- SYSCHECK (FILE INTEGRITY MONITORING)                          -->
  <!-- ============================================================ -->

  <syscheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>

    <directories check_all="yes" realtime="no">/bin</directories>
    <directories check_all="yes" realtime="no">/sbin</directories>
    <directories check_all="yes" realtime="no">/usr/bin</directories>
    <directories check_all="yes" realtime="no">/usr/sbin</directories>
    <directories check_all="yes" realtime="no">/etc</directories>

    <directories check_all="yes" realtime="yes">/etc/ssh</directories>
    <directories check_all="yes" realtime="yes">/etc/sudoers.d</directories>
    <directories check_all="yes" realtime="yes">/etc/cron.d</directories>
    <directories check_all="yes" realtime="yes">/root/.ssh</directories>

    <directories check_all="yes" realtime="yes">/etc/passwd</directories>
    <directories check_all="yes" realtime="yes">/etc/shadow</directories>
    <directories check_all="yes" realtime="yes">/etc/sudoers</directories>
    <directories check_all="yes" realtime="yes">/etc/crontab</directories>

    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/random.seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>

    <ignore type="sregex">.log$|.swp$</ignore>

  </syscheck>

  <!-- ============================================================ -->
  <!-- ROOTCHECK                                                     -->
  <!-- ============================================================ -->

  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>

    <frequency>43200</frequency>

    <rootkit_files>/var/ossec/etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>/var/ossec/etc/shared/rootkit_trojans.txt</rootkit_trojans>

    <skip_nfs>yes</skip_nfs>
  </rootcheck>

  <!-- ============================================================ -->
  <!-- SCA (SECURITY CONFIGURATION ASSESSMENT)                       -->
  <!-- ============================================================ -->

  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </sca>

  <!-- ============================================================ -->
  <!-- SYSCOLLECTOR (INVENTARIO)                                     -->
  <!-- ============================================================ -->

  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

</agent_config>
