Get-Package -Name "Wazuh Agent" | Uninstall-Package


docker rmi wazuh/wazuh-indexer:4.14.4 wazuh/wazuh-manager:4.14.4 wazuh/wazuh-dashboard:4.14.4 -f

sudo nano /opt/wazuh/single-node/config/wazuh_indexer/internal_users.yml

docker exec -it wazusiem-wazuh.indexer-1 bash -c "export OPENSEARCH_JAVA_HOME=/usr/share/wazuh-indexer/jdk && bash plugins/opensearch-security/tools/securityadmin.sh -cd config/opensearch-security/ -icl -nhnv -cacert config/certs/root-ca.pem -cert config/certs/admin.pem -key config/certs/admin-key.pem"

