version: '3.8'

volumes:
  wazuh_certs:
  wazuh_indexer_data:
  wazuh_manager_data:
  wazuh_dashboard_config:

services:
  # Generador automático (para no tener que subir carpetas /config manualmente)
  wazuh.init:
    image: wazuh/wazuh-certs-generator:0.0.1
    hostname: wazuh.init
    user: "0:0"
    volumes:
      - wazuh_certs:/certs
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /config
        printf "instances:\n  - name: wazuh.indexer\n    ip:\n      - 127.0.0.1\n  - name: wazuh.manager\n  - name: wazuh.dashboard\n" > /config/instances.yml
        /entrypoint.sh
        chmod -R 777 /certs
    networks:
      - wazuh_net

  wazuh.manager:
    image: wazuh/wazuh-manager:4.8.0
    hostname: wazuh.manager
    restart: always
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh_manager_data:/var/ossec
      - wazuh_certs:/etc/ssl/root-ca.pem:ro # Montamos el root-ca generado
      - wazuh_certs:/etc/ssl/filebeat.pem:ro # Montamos el cert generado
      - wazuh_certs:/etc/ssl/filebeat.key:ro # Montamos la key generada
    networks:
      - wazuh_net

  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.8.0
    hostname: wazuh.indexer
    restart: always
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - wazuh_certs:/usr/share/wazuh-indexer/certs
    networks:
      - wazuh_net

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.8.0
    hostname: wazuh.dashboard
    restart: always
    ports:
      - 443:5601
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh_certs:/usr/share/wazuh-dashboard/certs
      - wazuh_dashboard_config:/usr/share/wazuh-dashboard/data/wazuh/config
    networks:
      - wazuh_net
    depends_on:
      - wazuh.indexer

networks:
  wazuh_net:
    driver: bridge
