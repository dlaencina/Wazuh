version: '3.8'

services:
  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.7.2
    hostname: wazuh.indexer
    restart: always
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - wazuh-indexer-certs:/usr/share/wazuh-indexer/certs:ro
      - wazuh-indexer-data:/usr/share/wazuh-indexer/data
    ports:
      - "9200:9200"

  wazuh.manager:
    image: wazuh/wazuh-manager:4.7.2
    hostname: wazuh.manager
    restart: always
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USER=admin
      - INDEXER_PASSWORD=SecretPassword01!
    volumes:
      - wazuh-indexer-certs:/etc/wazuh-indexer/certs:ro
      - wazuh-manager-data:/var/ossec/data

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.7.2
    hostname: wazuh.dashboard
    restart: always
    ports:
      - "443:5601"
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - WAZUH_MANAGER=https://wazuh.manager
    volumes:
      - wazuh-indexer-certs:/usr/share/wazuh-dashboard/certs:ro
    depends_on:
      - wazuh.indexer

volumes:
  wazuh-indexer-certs:
  wazuh-indexer-data:
  wazuh-manager-data:
