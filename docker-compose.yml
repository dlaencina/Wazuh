Ejecuta estos comandos en tu terminal, uno por uno. Te explico qué hace cada uno:

1. Destruir lo que está en ejecución (Contenedores)
Bash
sudo docker stop $(sudo docker ps -aq)
sudo docker rm -f $(sudo docker ps -aq)
Qué hace: Detiene a la fuerza y luego elimina todos los contenedores que existan, sin importar si son de Wazuh, Portainer o cualquier otra cosa.

2. Borrar imágenes, volúmenes y redes (Datos)
Bash
sudo docker system prune -a --volumes -f
Qué hace: Es la aspiradora de Docker. Borra todas las imágenes descargadas, las redes internas y los volúmenes de datos donde se habían quedado atascados los certificados.

3. Desinstalar Docker del sistema
Bash
sudo apt-get purge -y docker-engine docker docker.io docker-ce docker-ce-cli docker-compose-plugin
sudo apt-get autoremove -y --purge
Qué hace: Desinstala los programas y librerías de Docker de tu Kali Linux. El autoremove elimina las dependencias que ya no sirven.

4. Eliminar las carpetas físicas (Matar a los fantasmas)
Bash
sudo rm -rf /var/lib/docker /etc/docker /var/lib/containerd
Qué hace: Este es el paso más importante. Borra los directorios reales en tu disco duro donde Docker guarda sus archivos de sistema. Esto garantiza que cuando vuelvas a instalar, no haya memorias del pasado.



1. Actualizar los repositorios
Bash
sudo apt update
Qué hace: Descarga la lista más reciente de software disponible para asegurarnos de instalar la última versión de Docker.

2. Instalar Docker y Compose
Bash
sudo apt install -y docker.io docker-compose-plugin
Qué hace: docker.io es el motor principal de contenedores. docker-compose-plugin es la herramienta que nos permitirá leer tu archivo docker-compose.yml más adelante. El -y simplemente acepta la instalación automáticamente para que no te pregunte.

3. Activar y arrancar el servicio
Bash
sudo systemctl enable --now docker
Qué hace: enable le dice a Kali que arranque Docker automáticamente cada vez que enciendas el ordenador. --now hace que arranque en este mismo instante sin necesidad de reiniciar.

Verificación
Para comprobar que el motor está perfectamente instalado y limpio, ejecuta:

Bash
sudo docker ps
Debería salirte la tabla de contenedores (CONTAINER ID, IMAGE, COMMAND...) totalmente vacía.


Ejecuta estos dos comandos en tu terminal.

1. Crear el volumen de datos
Bash
sudo docker volume create portainer_data
Qué hace: Crea un espacio de almacenamiento persistente. Si alguna vez borras el contenedor de Portainer por error, tus configuraciones y contraseñas seguirán a salvo aquí.

2. Instalar y arrancar Portainer
Bash
sudo docker run -d -p 8000:8000 -p 9443:9443 --name portainer \
    --restart=always \
    -v /var/run/docker.sock:/var/run/docker.sock \
    -v portainer_data:/data \
    portainer/portainer-ce:latest
Análisis de los parámetros:

-d: Ejecuta el contenedor en segundo plano (detach) para dejarte la consola libre.

-p 8000:8000 -p 9443:9443: Abre los puertos necesarios. El 9443 es el importante, ya que sirve para acceder a la interfaz web por HTTPS.

--name portainer: Le asigna un nombre fijo y reconocible.

--restart=always: Le indica al motor de Docker que si reinicias tu Kali Linux, Portainer debe encenderse solo.

-v /var/run/docker.sock:/var/run/docker.sock: Es el "cable" que conecta Portainer con el motor interno de Docker. Sin esto, Portainer no tendría permisos para crear o borrar otros contenedores.

Siguiente paso
Abre tu navegador web y entra en: https://localhost:9443 (o cambia localhost por la IP de tu Kali si estás accediendo desde otro equipo).
